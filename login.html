<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#16266b">
<link rel="icon" href="logo_laforet.png">
<link rel="apple-touch-icon" href="logo_laforet.png">
<!--
  Content-Security-Policy :
  - script-src 'self' : uniquement nos propres scripts (supabase-lib.js est vendorisé en local,
    plus de CDN externe).
  - connect-src 'self' https://tclqiusyonocedobtoky.supabase.co : autorise les appels vers l'API
    Supabase (auth + base de données), en plus des appels internes.
-->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://tclqiusyonocedobtoky.supabase.co; object-src 'none'; base-uri 'self'; form-action 'none'; frame-ancestors 'self'">
<title>Connexion — Laforêt Pithiviers</title>
<style>
  :root {
    --blue: #16266b;
    --blue-d: #0f1b50;
    --blue-l: #e9ecf7;
    --sky: #29a9e0;
    --bg: #eef1fa;
    --card: #fff;
    --ink: #161d33;
    --muted: #525d7a;
    --line: #e2e7f0;
    --shadow: 0 1px 3px rgba(22,38,107,.08), 0 8px 24px rgba(22,38,107,.07);
    --radius: 16px;
    --error: #c0392b;
    --error-bg: #fdecea;
  }
  [data-theme="dark"] {
    --bg:#0f1117; --card:#1a1f2e; --ink:#e8ecf4; --muted:#8892aa;
    --line:#2a3148; --shadow:0 1px 3px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.25);
    --blue-l:#1a2240;
    --error-bg: #3a1f1f;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; min-height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .carte {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 40px 32px;
    width: 100%;
    max-width: 380px;
  }
  .logo {
    display: block;
    width: 64px;
    height: 64px;
    margin: 0 auto 20px;
    border-radius: 12px;
  }
  h1 {
    font-size: 20px;
    text-align: center;
    margin: 0 0 6px;
    color: var(--blue);
  }
  [data-theme="dark"] h1 { color: var(--sky); }
  p.sous-titre {
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    margin: 0 0 28px;
  }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 6px;
  }
  input {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: var(--bg);
    color: var(--ink);
    font-size: 15px;
    margin-bottom: 18px;
    font-family: inherit;
  }
  input:focus {
    outline: none;
    border-color: var(--sky);
  }
  button {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 10px;
    background: var(--blue);
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
  button:hover { background: var(--blue-d); }
  button:disabled { opacity: .6; cursor: not-allowed; }
  .message-erreur {
    background: var(--error-bg);
    color: var(--error);
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 14px;
    margin-bottom: 18px;
    display: none;
  }
  .message-erreur.visible { display: block; }
  .message-succes {
    background: var(--blue-l);
    color: var(--blue);
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 14px;
    margin-bottom: 18px;
    display: none;
  }
  [data-theme="dark"] .message-succes { color: var(--sky); }
  .message-succes.visible { display: block; }
  .onglets {
    display: flex;
    gap: 4px;
    background: var(--bg);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 24px;
  }
  .onglet {
    flex: 1;
    text-align: center;
    padding: 9px 4px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    background: transparent;
    border: none;
    font-family: inherit;
    width: auto;
  }
  .onglet.actif {
    background: var(--card);
    color: var(--blue);
    box-shadow: var(--shadow);
  }
  [data-theme="dark"] .onglet.actif { color: var(--sky); }
  .vue { display: none; }
  .vue.active { display: block; }
  p.aide {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    margin: -8px 0 18px;
  }
  p.aide a {
    color: var(--blue);
    text-decoration: none;
    font-weight: 600;
    cursor: pointer;
  }
  [data-theme="dark"] p.aide a { color: var(--sky); }
  footer {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    margin-top: 24px;
  }
</style>
</head>
<body>

<div class="carte">
  <img class="logo" src="logo_laforet.png" alt="Laforêt Pithiviers">
  <h1 id="titreVue">Connexion</h1>
  <p class="sous-titre">Portail interne — Laforêt Pithiviers</p>

  <div class="onglets">
    <button type="button" class="onglet actif" data-vue="connexion">Connexion</button>
    <button type="button" class="onglet" data-vue="inscription">Créer un compte</button>
  </div>

  <div id="messageErreur" class="message-erreur"></div>
  <div id="messageSucces" class="message-succes"></div>

  <!-- Vue : connexion -->
  <div class="vue active" id="vueConnexion">
    <form id="formConnexion">
      <label for="email">Adresse email</label>
      <input type="email" id="email" autocomplete="username" required>

      <label for="motdepasse">Mot de passe</label>
      <input type="password" id="motdepasse" autocomplete="current-password" required>

      <button type="submit" id="btnConnexion">Se connecter</button>
    </form>
    <p class="aide"><a id="lienMdpOublie">Mot de passe oublié ?</a></p>
  </div>

  <!-- Vue : création de compte -->
  <div class="vue" id="vueInscription">
    <form id="formInscription">
      <label for="emailInscription">Adresse email</label>
      <input type="email" id="emailInscription" autocomplete="username" required>

      <label for="motdepasseInscription">Mot de passe</label>
      <input type="password" id="motdepasseInscription" autocomplete="new-password" minlength="6" required>

      <label for="motdepasseInscriptionConfirmation">Confirmer le mot de passe</label>
      <input type="password" id="motdepasseInscriptionConfirmation" autocomplete="new-password" minlength="6" required>

      <button type="submit" id="btnInscription">Créer mon compte</button>
    </form>
  </div>

  <!-- Vue : mot de passe oublié -->
  <div class="vue" id="vueMdpOublie">
    <p class="aide" style="margin-top:0">Saisissez votre email, vous recevrez un lien pour choisir un nouveau mot de passe.</p>
    <form id="formMdpOublie">
      <label for="emailMdpOublie">Adresse email</label>
      <input type="email" id="emailMdpOublie" autocomplete="username" required>

      <button type="submit" id="btnMdpOublie">Envoyer le lien</button>
    </form>
    <p class="aide"><a id="lienRetourConnexion">Retour à la connexion</a></p>
  </div>

  <footer>Laforêt Pithiviers · Usage interne</footer>
</div>

<script src="supabase-lib.js"></script>
<script src="supabase-client.js"></script>
<script>
// Si l'utilisateur est déjà connecté, on le renvoie directement vers le portail.
(async function () {
  const utilisateur = await getUtilisateurConnecte();
  if (utilisateur) {
    window.location.href = 'index.html';
  }
})();

const messageErreur = document.getElementById('messageErreur');
const messageSucces = document.getElementById('messageSucces');
const titreVue = document.getElementById('titreVue');

function afficherErreur(texte) {
  messageSucces.classList.remove('visible');
  messageErreur.textContent = texte;
  messageErreur.classList.add('visible');
}

function afficherSucces(texte) {
  messageErreur.classList.remove('visible');
  messageSucces.textContent = texte;
  messageSucces.classList.add('visible');
}

function masquerMessages() {
  messageErreur.classList.remove('visible');
  messageSucces.classList.remove('visible');
}

// --- Navigation entre les vues (connexion / inscription / mot de passe oublié) ---

const titres = {
  connexion: 'Connexion',
  inscription: 'Créer un compte',
  mdpoublie: 'Mot de passe oublié'
};

function afficherVue(nomVue) {
  masquerMessages();
  document.querySelectorAll('.vue').forEach(function (v) { v.classList.remove('active'); });
  document.getElementById('vue' + nomVue.charAt(0).toUpperCase() + nomVue.slice(1)).classList.add('active');
  titreVue.textContent = titres[nomVue] || 'Connexion';

  document.querySelectorAll('.onglet').forEach(function (o) {
    o.classList.toggle('actif', o.dataset.vue === nomVue);
  });
}

document.querySelectorAll('.onglet').forEach(function (o) {
  o.addEventListener('click', function () { afficherVue(o.dataset.vue); });
});

document.getElementById('lienMdpOublie').addEventListener('click', function () {
  afficherVue('mdpoublie');
});

document.getElementById('lienRetourConnexion').addEventListener('click', function () {
  afficherVue('connexion');
});

// --- Connexion ---

const formConnexion = document.getElementById('formConnexion');
const btnConnexion = document.getElementById('btnConnexion');

formConnexion.addEventListener('submit', async function (e) {
  e.preventDefault();
  masquerMessages();

  const email = document.getElementById('email').value.trim();
  const motdepasse = document.getElementById('motdepasse').value;

  btnConnexion.disabled = true;
  btnConnexion.textContent = 'Connexion...';

  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email: email,
    password: motdepasse
  });

  btnConnexion.disabled = false;
  btnConnexion.textContent = 'Se connecter';

  if (error) {
    afficherErreur('Email ou mot de passe incorrect.');
    return;
  }

  // Connexion réussie : redirection vers le portail d'accueil.
  window.location.href = 'index.html';
});

// --- Création de compte ---

const formInscription = document.getElementById('formInscription');
const btnInscription = document.getElementById('btnInscription');

formInscription.addEventListener('submit', async function (e) {
  e.preventDefault();
  masquerMessages();

  const email = document.getElementById('emailInscription').value.trim();
  const motdepasse = document.getElementById('motdepasseInscription').value;
  const confirmation = document.getElementById('motdepasseInscriptionConfirmation').value;

  if (motdepasse !== confirmation) {
    afficherErreur('Les mots de passe ne correspondent pas.');
    return;
  }
  if (motdepasse.length < 6) {
    afficherErreur('Le mot de passe doit contenir au moins 6 caractères.');
    return;
  }

  btnInscription.disabled = true;
  btnInscription.textContent = 'Création...';

  const { data, error } = await inscription(email, motdepasse);

  btnInscription.disabled = false;
  btnInscription.textContent = 'Créer mon compte';

  if (error) {
    afficherErreur(error.message === 'User already registered'
      ? 'Un compte existe déjà avec cet email.'
      : 'Impossible de créer le compte. Réessayez.');
    return;
  }

  // Selon la configuration Supabase, l'utilisateur est parfois connecté
  // immédiatement (session présente), ou doit d'abord confirmer son email.
  if (data.session) {
    window.location.href = 'index.html';
    return;
  }

  formInscription.reset();
  afficherVue('connexion');
  afficherSucces('Compte créé. Vérifiez votre boîte mail pour confirmer votre adresse avant de vous connecter.');
});

// --- Mot de passe oublié ---

const formMdpOublie = document.getElementById('formMdpOublie');
const btnMdpOublie = document.getElementById('btnMdpOublie');

formMdpOublie.addEventListener('submit', async function (e) {
  e.preventDefault();
  masquerMessages();

  const email = document.getElementById('emailMdpOublie').value.trim();

  btnMdpOublie.disabled = true;
  btnMdpOublie.textContent = 'Envoi...';

  const { error } = await demanderReinitialisationMdp(email);

  btnMdpOublie.disabled = false;
  btnMdpOublie.textContent = 'Envoyer le lien';

  if (error) {
    afficherErreur("Impossible d'envoyer l'email. Réessayez.");
    return;
  }

  formMdpOublie.reset();
  afficherSucces('Si un compte existe avec cet email, un lien de réinitialisation vient de vous être envoyé.');
});
</script>

</body>
</html>
