<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#16266b">
<link rel="icon" href="logo_laforet.png">
<link rel="apple-touch-icon" href="logo_laforet.png">
<!--
  Content-Security-Policy : identique à login.html / reinitialiser-mdp.html.
-->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://tclqiusyonocedobtoky.supabase.co; object-src 'none'; base-uri 'self'; form-action 'none'; frame-ancestors 'self'">
<title>Accepter l'invitation — Laforêt Pithiviers</title>
<style>
  :root {
    --blue: #16266b;
    --blue-d: #0f1b50;
    --blue-l: #e9ecf7;
    --sky: #29a9e0;
    --bg: #eef1fa;
    --card: #fff;
    --ink: #161d33;
    --muted: #525d7a;
    --line: #e2e7f0;
    --shadow: 0 1px 3px rgba(22,38,107,.08), 0 8px 24px rgba(22,38,107,.07);
    --radius: 16px;
    --error: #c0392b;
    --error-bg: #fdecea;
  }
  [data-theme="dark"] {
    --bg:#0f1117; --card:#1a1f2e; --ink:#e8ecf4; --muted:#8892aa;
    --line:#2a3148; --shadow:0 1px 3px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.25);
    --blue-l:#1a2240;
    --error-bg: #3a1f1f;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; min-height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .carte {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 40px 32px;
    width: 100%;
    max-width: 380px;
  }
  .logo {
    display: block;
    width: 64px;
    height: 64px;
    margin: 0 auto 20px;
    border-radius: 12px;
  }
  h1 {
    font-size: 20px;
    text-align: center;
    margin: 0 0 6px;
    color: var(--blue);
  }
  [data-theme="dark"] h1 { color: var(--sky); }
  p.sous-titre {
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    margin: 0 0 8px;
  }
  .email-detecte {
    text-align: center;
    font-size: 13.5px;
    font-weight: 600;
    color: var(--blue);
    background: var(--blue-l);
    border-radius: 999px;
    padding: 7px 14px;
    margin: 0 0 24px;
    display: none;
    word-break: break-all;
  }
  [data-theme="dark"] .email-detecte { color: var(--sky); }
  .email-detecte.visible { display: block; }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 6px;
  }
  input {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: var(--bg);
    color: var(--ink);
    font-size: 15px;
    margin-bottom: 18px;
    font-family: inherit;
  }
  input:focus {
    outline: none;
    border-color: var(--sky);
  }
  input:disabled {
    opacity: .55;
    cursor: not-allowed;
  }
  button {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 10px;
    background: var(--blue);
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
  button:hover:not(:disabled) { background: var(--blue-d); }
  button:disabled { opacity: .6; cursor: not-allowed; }
  .message-erreur {
    background: var(--error-bg);
    color: var(--error);
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 14px;
    margin-bottom: 18px;
    display: none;
    line-height: 1.5;
  }
  .message-erreur.visible { display: block; }
  .message-succes {
    background: var(--blue-l);
    color: var(--blue);
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 14px;
    margin-bottom: 18px;
    display: none;
    line-height: 1.5;
  }
  [data-theme="dark"] .message-succes { color: var(--sky); }
  .message-succes.visible { display: block; }
  .message-attente {
    text-align: center;
    color: var(--muted);
    font-size: 13.5px;
    margin: 0 0 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .spinner {
    width: 14px;
    height: 14px;
    border: 2px solid var(--line);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: tourner .7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes tourner { to { transform: rotate(360deg); } }
  p.aide {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    margin: 18px 0 0;
  }
  p.aide a {
    color: var(--blue);
    text-decoration: none;
    font-weight: 600;
    cursor: pointer;
  }
  [data-theme="dark"] p.aide a { color: var(--sky); }
  footer {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    margin-top: 24px;
  }
</style>
</head>

<body>

<div class="carte">
  <img class="logo" src="logo_laforet.png" alt="Laforêt Pithiviers">
  <h1>Bienvenue sur le portail</h1>
  <p class="sous-titre">Laforêt Pithiviers — Définissez votre mot de passe pour activer votre compte.</p>
  <div id="emailDetecte" class="email-detecte"></div>

  <div id="messageAttente" class="message-attente">
    <span class="spinner"></span> Vérification de votre invitation...
  </div>
  <div id="messageErreur" class="message-erreur"></div>
  <div id="messageSucces" class="message-succes"></div>

  <form id="formInvitation">
    <label for="motdepasse">Choisissez un mot de passe</label>
    <input type="password" id="motdepasse" autocomplete="new-password" minlength="6" required disabled>

    <label for="motdepasseConfirmation">Confirmer le mot de passe</label>
    <input type="password" id="motdepasseConfirmation" autocomplete="new-password" minlength="6" required disabled>

    <button type="submit" id="btnInvitation" disabled>Activer mon compte</button>
  </form>

  <p class="aide"><a href="login.html">Vous avez déjà un compte actif ? Se connecter</a></p>

  <footer>Laforêt Pithiviers · Usage interne</footer>
</div>

<script src="supabase-lib.js"></script>
<script src="supabase-client.js"></script>
<script>
const form = document.getElementById('formInvitation');
const btn = document.getElementById('btnInvitation');
const champMotDePasse = document.getElementById('motdepasse');
const champConfirmation = document.getElementById('motdepasseConfirmation');
const messageAttente = document.getElementById('messageAttente');
const messageErreur = document.getElementById('messageErreur');
const messageSucces = document.getElementById('messageSucces');
const emailDetecte = document.getElementById('emailDetecte');

function afficherErreur(texte) {
  messageSucces.classList.remove('visible');
  messageErreur.textContent = texte;
  messageErreur.classList.add('visible');
}

function afficherSucces(texte) {
  messageErreur.classList.remove('visible');
  messageSucces.textContent = texte;
  messageSucces.classList.add('visible');
}

function activerFormulaire(session) {
  messageAttente.style.display = 'none';
  // Au cas où le filet de sécurité (timeout) se serait déjà déclenché juste
  // avant que la session n'arrive (connexion lente) : on efface ce faux
  // positif, la session étant maintenant bien établie.
  messageErreur.classList.remove('visible');
  champMotDePasse.disabled = false;
  champConfirmation.disabled = false;
  btn.disabled = false;
  if (session && session.user && session.user.email) {
    emailDetecte.textContent = session.user.email;
    emailDetecte.classList.add('visible');
  }
  champMotDePasse.focus();
}

// Le lien d'invitation reçu par email place un token dans le hash de l'URL.
// La librairie Supabase l'échange automatiquement contre une session
// temporaire dès le chargement de la page, ce qui déclenche l'événement
// SIGNED_IN. Tant que cet échange n'a pas eu lieu, le formulaire reste
// désactivé pour éviter tout appel updateUser sans session valide.
let sessionInvitationPrete = false;

supabaseClient.auth.onAuthStateChange(function (evenement, session) {
  if ((evenement === 'SIGNED_IN' || evenement === 'INITIAL_SESSION') && session && !sessionInvitationPrete) {
    sessionInvitationPrete = true;
    activerFormulaire(session);
  }
});

// Filet de sécurité : si le lien est invalide, déjà utilisé ou expiré,
// aucune session ne sera établie. On prévient l'utilisateur après un
// court délai plutôt que de le laisser devant un formulaire figé.
setTimeout(function () {
  if (!sessionInvitationPrete) {
    messageAttente.style.display = 'none';
    afficherErreur("Ce lien d'invitation est invalide, a expiré, ou a déjà été utilisé. Demandez à un responsable de vous envoyer une nouvelle invitation depuis le tableau de bord Supabase.");
  }
}, 10000);

form.addEventListener('submit', async function (e) {
  e.preventDefault();
  if (!sessionInvitationPrete) return;

  messageErreur.classList.remove('visible');
  messageSucces.classList.remove('visible');

  const motdepasse = champMotDePasse.value;
  const confirmation = champConfirmation.value;

  if (motdepasse !== confirmation) {
    afficherErreur('Les mots de passe ne correspondent pas.');
    return;
  }
  if (motdepasse.length < 6) {
    afficherErreur('Le mot de passe doit contenir au moins 6 caractères.');
    return;
  }

  btn.disabled = true;
  champMotDePasse.disabled = true;
  champConfirmation.disabled = true;
  btn.textContent = 'Activation...';

  const { error } = await mettreAJourMotDePasse(motdepasse);

  if (error) {
    btn.disabled = false;
    champMotDePasse.disabled = false;
    champConfirmation.disabled = false;
    btn.textContent = 'Activer mon compte';
    afficherErreur('Impossible de définir le mot de passe. Réessayez.');
    return;
  }

  form.reset();
  btn.textContent = 'Compte activé';
  afficherSucces('Votre compte est activé. Redirection vers le portail...');
  setTimeout(function () { window.location.href = 'index.html'; }, 1500);
});
</script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
</body>
</html>
