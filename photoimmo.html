<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#16266b">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: blob:; media-src 'self' blob:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://tclqiusyonocedobtoky.supabase.co; object-src 'none'; base-uri 'self'; form-action 'none'; frame-ancestors 'self'">
<link rel="icon" href="logo_laforet.png">
<link rel="apple-touch-icon" href="logo_laforet.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PhotoImmo">
<title>PhotoImmo Pro — Laforêt</title>
<meta name="description" content="Notez et gérez vos photos de biens immobiliers pièce par pièce, avec guide de prise de vue — Laforêt Pithiviers.">
<style>
  :root{
    --green:#16266b; --green-d:#0f1b50; --green-l:#e9ecf7;
    --gold:#29a9e0; --gold-l:#e4f4fc;
    --bg:#f4f6fa; --card:#fff; --ink:#161d33; --muted:#525d7a;
    --line:#e2e7f0; --shadow:0 1px 3px rgba(22,38,107,.08),0 8px 24px rgba(22,38,107,.07);
    --radius:16px; --ok:#0f6b3f; --mid:#b07d12; --bad:#c0492f;
    --ok-bg:#eaf6ef; --ok-border:#3f9d6b; --ok-ink:#0f6b3f;
    --import:#7c5cff; --import-bg:#f2efff; --import-border:#d8cdff;
    --pbar-bg:#e6eaf2; --bar-bg:#eceef3;
    --priority-bg:#fff4e6; --priority-border:#f0a44a; --priority-accent:#e8862a; --priority-ink:#5b3b12;
  }
  [data-theme="dark"]{
    --bg:#0f1117; --card:#1a1f2e; --ink:#e8ecf4; --muted:#8892aa;
    --line:#2a3148; --shadow:0 1px 3px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.25);
    --green-l:#1a2240; --gold-l:#0e2030;
    --ok-bg:#123524; --ok-border:#1f6b46; --ok-ink:#6fd9a0;
    --import:#a78bfa; --import-bg:#241f3a; --import-border:#4a3f78;
    --pbar-bg:#252c42; --bar-bg:#252c42;
    --priority-bg:#2a1f0e; --priority-border:#8a5a1a; --priority-accent:#e8862a; --priority-ink:#e0c090;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.5;padding-bottom:env(safe-area-inset-bottom)}
  :focus-visible{outline:3px solid var(--gold);outline-offset:2px}
  header{background:linear-gradient(135deg,var(--green-d),var(--green));color:#fff;
    padding:calc(16px + env(safe-area-inset-top)) 18px 16px;position:sticky;top:0;z-index:50;box-shadow:0 2px 16px rgba(15,46,29,.25)}
  .h-top{display:flex;align-items:center;gap:12px}
  .logo{width:46px;height:46px;border-radius:12px;overflow:hidden;flex:none;border:1px solid rgba(255,255,255,.18);background:#fff}
  .logo img{width:100%;height:100%;object-fit:cover;display:block}
  header h1{font-size:18px;margin:0;font-weight:800;letter-spacing:.2px}
  header p{margin:2px 0 0;font-size:12px;opacity:.85}
  .back-home{background:rgba(255,255,255,.16);border:none;color:#fff;font-size:13px;font-weight:700;padding:8px 13px;border-radius:999px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:5px;flex:none}
  .wrap{max-width:760px;margin:0 auto;padding:16px 16px 90px}
  .section-title{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin:22px 4px 10px}
  .section-title:first-child{margin-top:4px}

  .btn{border:none;border-radius:14px;font-weight:800;cursor:pointer;font-size:15.5px;padding:15px;min-height:54px;display:flex;align-items:center;justify-content:center;gap:9px;transition:.12s}
  .btn:active{transform:scale(.98)}
  .btn-primary{background:linear-gradient(135deg,var(--green),#2b6fc4);color:#fff;box-shadow:var(--shadow);width:100%}
  .btn-gold{background:var(--gold);color:#06243f;width:100%}
  .btn-ghost{background:var(--card);color:var(--ink);border:1.5px solid var(--line)}
  #nbType .btn[aria-pressed="true"]{background:var(--green);color:#fff;border-color:var(--green)}
  .btn-green{background:var(--ok);color:#fff}
  .btn-row{display:flex;gap:10px}
  .btn-row>*{flex:1}

  /* cards biens */
  .bien-card{background:var(--card);border:1.5px solid var(--line);border-radius:var(--radius);padding:15px 16px;box-shadow:var(--shadow);margin-bottom:11px;cursor:pointer;display:flex;align-items:center;gap:13px}
  .bien-card:active{transform:scale(.99)}
  .bien-ic{width:46px;height:46px;border-radius:12px;background:var(--green-l);display:grid;place-items:center;font-size:24px;flex:none}
  .bien-main{flex:1;min-width:0}
  .bien-addr{font-weight:800;font-size:15.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bien-sub{font-size:12.5px;color:var(--muted);margin-top:2px}
  .bien-prog{font-size:12px;font-weight:700;color:var(--green);background:var(--green-l);padding:4px 10px;border-radius:999px;flex:none}
  .bien-del{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;flex:none;padding:4px}
  .empty{text-align:center;color:var(--muted);font-size:14.5px;padding:40px 20px;line-height:1.6}

  /* progress bar */
  .pbar{height:9px;border-radius:99px;background:var(--pbar-bg);overflow:hidden;margin-top:8px}
  .pbar>i{display:block;height:100%;background:var(--green);border-radius:99px;transition:width .4s}

  /* room rows (shot list) */
  .roomlist{display:flex;flex-direction:column;gap:9px}
  .roomrow{background:var(--card);border:1.5px solid var(--line);border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow)}
  .roomrow.done{border-color:var(--ok-border);background:var(--ok-bg)}
  .roomrow .rr-ic{font-size:25px;flex:none}
  .roomrow .rr-main{flex:1;min-width:0}
  .roomrow .rr-name{font-weight:800;font-size:14.5px}
  .roomrow .rr-sub{font-size:12px;color:var(--muted);margin-top:1px}
  .roomrow .rr-badge{font-size:12px;font-weight:800;color:#fff;border-radius:8px;padding:3px 8px;flex:none}
  .rr-badge.ok{background:var(--ok)} .rr-badge.mid{background:var(--mid)} .rr-badge.bad{background:var(--bad)}
  .rr-act{display:flex;gap:7px;flex:none}
  .rr-shoot{background:var(--green);color:#fff;border:none;border-radius:10px;width:42px;height:42px;font-size:19px;cursor:pointer;display:grid;place-items:center}
  .rr-guide{background:var(--priority-bg);color:var(--priority-accent);border:1.5px solid var(--priority-border);border-radius:10px;width:42px;height:42px;font-size:17px;cursor:pointer;display:grid;place-items:center}
  .rr-import{background:var(--import-bg);color:var(--import);border:1.5px solid var(--import-border);border-radius:10px;width:42px;height:42px;font-size:17px;cursor:pointer;display:grid;place-items:center}
  .rr-cmp{background:var(--gold);color:#06243f;border:none;border-radius:10px;width:42px;height:42px;font-size:17px;cursor:pointer;display:grid;place-items:center}

  /* overlay screens */
  .screen{position:fixed;inset:0;background:var(--bg);z-index:100;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none}
  .screen.open{display:block;animation:fade .2s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .s-head{background:linear-gradient(135deg,var(--green-d),var(--green));color:#fff;padding:calc(13px + env(safe-area-inset-top)) 16px 16px;position:sticky;top:0;z-index:5;display:flex;align-items:center;gap:12px}
  .s-back{background:rgba(255,255,255,.16);border:none;color:#fff;font-size:14px;font-weight:700;padding:9px 14px;border-radius:999px;cursor:pointer}
  .s-title{font-size:17px;font-weight:800;margin:0;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .s-body{max-width:760px;margin:0 auto;padding:16px 16px 90px}

  /* camera */
  #camWrap{position:fixed;inset:0;background:#000;z-index:200;display:none;flex-direction:column}
  #camWrap.open{display:flex}
  .cam-stage{position:relative;flex:1;overflow:hidden;background:#000}
  #camVideo{width:100%;height:100%;object-fit:cover;display:block}
  #camGuide{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
  .cam-top{position:absolute;top:0;left:0;right:0;padding:calc(10px + env(safe-area-inset-top)) 14px 10px;display:flex;align-items:center;gap:10px;background:linear-gradient(#000a,transparent);z-index:3}
  .cam-top .ct-title{color:#fff;font-weight:800;font-size:15px;flex:1;text-align:center}
  .cam-x{background:rgba(255,255,255,.18);border:none;color:#fff;width:40px;height:40px;border-radius:50%;font-size:20px;cursor:pointer}
  .cam-chips{position:absolute;left:0;right:0;bottom:118px;display:flex;flex-wrap:wrap;gap:7px;justify-content:center;padding:0 14px;z-index:3}
  .cam-chip{font-size:12.5px;font-weight:800;padding:6px 11px;border-radius:999px;color:#fff;background:rgba(0,0,0,.5);backdrop-filter:blur(3px);display:flex;align-items:center;gap:5px}
  .cam-chip.ok{background:rgba(15,107,63,.85)} .cam-chip.warn{background:rgba(192,73,47,.9)} .cam-chip.lvl{background:rgba(176,125,18,.9)}
  .cam-bar{position:absolute;left:0;right:0;bottom:0;padding:16px 0 calc(20px + env(safe-area-inset-bottom));display:flex;align-items:center;justify-content:center;gap:34px;background:linear-gradient(transparent,#000a);z-index:3}
  .shutter{width:74px;height:74px;border-radius:50%;background:#fff;border:5px solid rgba(255,255,255,.45);cursor:pointer}
  .shutter:active{transform:scale(.94)}
  .cam-side{width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.18);border:none;color:#fff;font-size:20px;cursor:pointer}
  .cam-msg{position:absolute;inset:0;display:grid;place-items:center;padding:30px;text-align:center;color:#fff;font-size:15px;line-height:1.6;z-index:4}

  /* score */
  .thumb{width:100%;max-height:58vh;object-fit:contain;background:#0d1430;border-radius:12px;margin:6px 0 12px;display:block;image-orientation:from-image}
  /* rotation EXIF manuelle (fallback iOS) */
  .thumb[data-rot="90"] {transform:rotate(90deg);max-height:none;width:58vh;margin:auto;display:block}
  .thumb[data-rot="180"]{transform:rotate(180deg)}
  .thumb[data-rot="270"]{transform:rotate(270deg);max-height:none;width:58vh;margin:auto;display:block}
  .thumb-wrap{position:relative;overflow:hidden}
  .thumb-wrap canvas{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;pointer-events:none;border-radius:12px}
  .ov-toggle{display:flex;gap:8px;margin:0 0 12px}
  .ov-toggle button{flex:1;border:1.5px solid var(--line);background:var(--card);border-radius:10px;padding:10px;font-size:13px;font-weight:700;cursor:pointer;color:var(--ink)}
  .ov-toggle button[aria-pressed="true"]{background:var(--green);color:#fff;border-color:var(--green)}
  .score-hero{text-align:center;padding:6px 0 2px}
  .gauge{position:relative;width:160px;height:160px;margin:4px auto}
  .gauge svg{transform:rotate(-90deg)}
  .gauge .val{position:absolute;inset:0;display:grid;place-items:center}
  .gauge .num{font-size:44px;font-weight:800;line-height:1}
  .gauge .den{font-size:12px;color:var(--muted);font-weight:600}
  .verdict{font-size:17px;font-weight:800;margin:4px 0 2px}
  .verdict-sub{font-size:13px;color:var(--muted);margin-bottom:6px;padding:0 8px}
  .priority{background:var(--priority-bg);border:1.5px solid var(--priority-border);border-left:5px solid var(--priority-accent);border-radius:12px;padding:12px 14px;margin:2px 0 14px;font-size:14px;color:var(--priority-ink);line-height:1.5}
  .priority .pt{font-weight:800;display:block;margin-bottom:3px;color:#9a5b12}
  .priority.good{background:var(--ok-bg);border-color:var(--ok-border);border-left-color:var(--ok);color:var(--ok-ink)}
  .priority.good .pt{color:var(--ok-ink)}
  .metric{margin-bottom:12px}
  .metric .top{display:flex;justify-content:space-between;align-items:baseline;font-size:14px;margin-bottom:5px}
  .metric .mname{font-weight:700}.metric .mscore{font-weight:800}
  .bar{height:9px;border-radius:99px;background:var(--bar-bg);overflow:hidden}
  .bar>i{display:block;height:100%;border-radius:99px;transition:width .5s}
  .bar.ok>i{background:var(--ok)}.bar.mid>i{background:var(--gold)}.bar.bad>i{background:#d0664f}
  .mtip{font-size:13.5px;color:var(--muted);margin-top:5px;line-height:1.5}.mtip.warn{color:#9a3b2e}
  .score-actions{display:flex;flex-wrap:wrap;gap:10px;margin:16px 0 6px}
  .score-actions button{flex:1;border-radius:12px;padding:15px;min-height:52px;font-size:15px;font-weight:700;cursor:pointer;border:1.5px solid var(--line);background:var(--card);color:var(--ink)}

  /* compare */
  .cmp-grid{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px}
  .cmp-card{flex:none;width:46%;max-width:230px;background:var(--card);border:1.5px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:var(--shadow);cursor:pointer;transition:.15s}
  .cmp-card:active{transform:scale(.97)}
  .cmp-card.best{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold)}
  .cmp-card.kept{border-color:var(--ok);box-shadow:0 0 0 2px var(--ok)}
  .cmp-card img{width:100%;height:130px;object-fit:cover;display:block;background:#0d1430}
  .cmp-info{padding:10px 11px}
  .cmp-score{font-size:22px;font-weight:800}
  .cmp-state{width:100%;margin-top:8px;border-radius:9px;padding:9px;font-weight:800;font-size:13px;text-align:center;background:var(--green-l);color:var(--green)}
  .cmp-card.kept .cmp-state{background:var(--ok);color:#fff}
  .cmp-actions{display:flex;gap:7px;margin-top:8px}
  .cmp-actions .cmp-state{margin-top:0;flex:1}
  .cmp-save{flex:none;width:40px;height:40px;border-radius:9px;border:1.5px solid var(--line);background:var(--card);color:var(--ink);cursor:pointer;display:grid;place-items:center}
  .cmp-save:active{transform:scale(.95)}
  .cmp-card img{cursor:zoom-in}

  /* lightbox */
  #lightbox{position:fixed;inset:0;background:#000;z-index:300;display:none;flex-direction:column}
  #lightbox.open{display:flex}
  .lb-top{position:absolute;top:0;left:0;right:0;padding:calc(10px + env(safe-area-inset-top)) 14px 10px;display:flex;align-items:center;z-index:2;background:linear-gradient(#000a,transparent)}
  .lb-close{background:rgba(255,255,255,.18);border:none;color:#fff;width:40px;height:40px;border-radius:50%;font-size:20px;cursor:pointer;margin-left:auto}
  .lb-stage{flex:1;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center;touch-action:none}
  .lb-stage img{max-width:100%;max-height:100%;object-fit:contain;user-select:none;-webkit-user-drag:none;transform-origin:center center;transition:transform .08s linear}

  /* guide (room detail) */
  .accroche{background:var(--gold-l);border-left:4px solid var(--gold);border-radius:10px;padding:12px 14px;font-size:14px;margin-bottom:14px;color:#1c3050}
  .gcard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px 15px;margin-bottom:11px;box-shadow:var(--shadow)}
  .gcard h3{margin:0 0 9px;font-size:13.5px;font-weight:800;color:var(--green);text-transform:uppercase;letter-spacing:.4px}
  .gcard p{margin:0;font-size:14.5px}.gcard ul{margin:0;padding-left:18px;font-size:14.5px}.gcard li{margin:5px 0}
  .srow{display:flex;gap:10px;font-size:14px;padding:6px 0;border-bottom:1px dashed var(--line)}
  .srow:last-child{border-bottom:none}.slabel{flex:none;width:92px;font-weight:700;color:var(--muted);font-size:12px;text-transform:uppercase}
  .eviter h3{color:#9a3b2e}.eviter li{color:#9a3b2e}
  .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:#11203f;color:#fff;font-weight:700;font-size:14px;padding:12px 18px;border-radius:999px;z-index:300;box-shadow:0 6px 20px rgba(0,0,0,.3);opacity:0;transition:.25s;pointer-events:none}
  .toast.show{opacity:1}

  /* Modale de confirmation (remplace les confirm() natifs du navigateur — même style que la Bibliothèque) */
  #confirm-overlay{position:fixed;inset:0;background:rgba(15,20,40,.55);display:none;align-items:center;justify-content:center;z-index:99998;padding:20px;backdrop-filter:blur(2px)}
  #confirm-overlay.show{display:flex}
  #confirm-box{background:var(--card);border:1px solid var(--line);border-radius:16px;max-width:380px;width:100%;padding:22px 22px 18px;box-shadow:0 20px 50px rgba(15,20,40,.3);animation:confirmIn .18s ease}
  @keyframes confirmIn{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
  #confirm-box h3{margin:0 0 8px;font-size:16px;font-weight:800;color:var(--ink)}
  #confirm-box p{margin:0 0 18px;font-size:13.5px;line-height:1.5;color:var(--muted)}
  #confirm-actions{display:flex;gap:10px;justify-content:flex-end}
  #confirm-actions button{border-radius:9px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid var(--line);font-family:inherit}
  #confirm-cancel-btn{background:var(--bg);color:var(--muted)}
  #confirm-cancel-btn:hover{background:var(--line)}
  #confirm-ok-btn{background:#dc2626;border-color:#dc2626;color:#fff}
  #confirm-ok-btn:hover{background:#b91c1c}
  .footer-note{text-align:center;color:var(--muted);font-size:12px;margin-top:22px;line-height:1.6}
  /* fiche imprimable (export PDF local) */
  #printArea{display:none}
  #printArea .pa-head{background:#0f1b50;color:#fff;padding:14px 16px;border-radius:8px;margin-bottom:14px}
  #printArea .pa-head h2{margin:0;font-size:18px}
  #printArea .pa-sub{font-size:12px;opacity:.9;margin-top:4px}
  #printArea .pa-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  #printArea figure{margin:0;break-inside:avoid;page-break-inside:avoid}
  #printArea img{width:100%;height:150px;object-fit:cover;border-radius:8px;background:#0d1430;display:block}
  #printArea figcaption{font-size:12px;font-weight:700;margin-top:5px}
  @media print{
    header,.wrap,.screen,#camWrap,.toast,input,#work,canvas#work{display:none!important}
    #printArea{display:block!important;padding:0}
    body{background:var(--bg)}
    @page{margin:12mm}
  }
</style>
</head>
<body>
<script src="supabase-lib.js"></script>
<script src="supabase-client.js"></script>
<script src="auth-guard.js"></script>
<header>
  <div class="h-top">
    <a class="back-home" href="index.html" title="Retour à l'accueil"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg> Accueil</a>
    <div class="logo"><img src="logo_laforet.png" alt="Laforêt"></div>
    <div>
      <h1>PhotoImmo <span style="font-size:11px;font-weight:700;letter-spacing:1.5px;background:var(--gold);color:var(--green-d);padding:2px 6px;border-radius:5px;vertical-align:middle">PRO</span></h1>
      <p>Shooting guidé, noté et livré — par bien</p>
    </div>
    <button class="dark-toggle" title="Mode sombre" aria-label="Basculer le mode sombre" style="background:rgba(255,255,255,.16);border:none;color:#fff;width:34px;height:34px;border-radius:50%;cursor:pointer;flex:none;margin-left:auto;display:flex;align-items:center;justify-content:center;padding:0"><svg class="dark-toggle-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
  </div>
</header>

<div class="wrap" id="home"></div>

<!-- BIEN -->

function ctxLabel(k){ return k==='general'?'Général':(DATA[k]?DATA[k].name:'Général'); }
function profileFor(k){
  const ovr=CTX_OVR[k]||{};
  const p=Object.assign({}, CTX_DEF, ovr, {key:k, label:ctxLabel(k)});
  p.w=Object.assign({}, CTX_DEF.w, ovr.w||{});   // fusion fine des poids (les clés non surchargées gardent le défaut)
  return p;
}
function detectBow(lum, W, H){
  // Pour une bande horizontale (haut ou bas), on cherche pour chaque colonne x
  // la position y du gradient vertical le plus fort (= contour le plus marqué).
  function strongestEdgeY(yStart, yEnd, xStep){
    const pts=[];
    for(let x=4;x<W-4;x+=xStep){
      let bestY=-1, bestG=0;
      for(let y=yStart+1;y<yEnd-1;y++){
        const g=Math.abs(lum[(y+1)*W+x]-lum[(y-1)*W+x]);
        if(g>bestG){ bestG=g; bestY=y; }
      }
      if(bestG>18) pts.push([x,bestY]); // seuil de gradient mini pour ignorer le bruit
    }
    return pts;
  }
  function strongestEdgeX(xStart, xEnd, yStep){
    const pts=[];
    for(let y=4;y<H-4;y+=yStep){
      let bestX=-1, bestG=0;
      for(let x=xStart+1;x<xEnd-1;x++){
        const g=Math.abs(lum[y*W+(x+1)]-lum[y*W+(x-1)]);
        if(g>bestG){ bestG=g; bestX=x; }
      }
      if(bestG>18) pts.push([y,bestX]);
    }
    return pts;
  }
  // écart-type des résidus par rapport à la droite de régression (mesure de courbure)
  function bowScore(pts){
    if(pts.length<8) return 0; // pas assez de contour détecté, on ne juge pas
    const n=pts.length;
    let sx=0,sy=0; pts.forEach(([a,b])=>{sx+=a;sy+=b;});
    const mx=sx/n, my=sy/n;
    let num=0,den=0;
    pts.forEach(([a,b])=>{ num+=(a-mx)*(b-my); den+=(a-mx)*(a-mx); });
    const slope = den!==0 ? num/den : 0;
    const intercept = my - slope*mx;
    let sumSq=0, maxAbs=0;
    pts.forEach(([a,b])=>{
      const resid=b-(slope*a+intercept);
      sumSq+=resid*resid;
      maxAbs=Math.max(maxAbs,Math.abs(resid));
    });
    const rmse=Math.sqrt(sumSq/n);
    return {rmse, maxAbs, n};
  }
  const bandH=Math.max(8,Math.round(H*0.10));
  const bandW=Math.max(8,Math.round(W*0.10));
  const top=bowScore(strongestEdgeY(0,bandH,4));
  const bottom=bowScore(strongestEdgeY(H-bandH,H,4));
  const left=bowScore(strongestEdgeX(0,bandW,4));
  const right=bowScore(strongestEdgeX(W-bandW,W,4));
  const candidates=[top,bottom,left,right].filter(c=>c && c.n>=8);
  if(!candidates.length) return {bow:0, detected:false};
  // on retient la pire courbure détectée (la plus parlante visuellement)
  const worst=candidates.reduce((a,c)=>c.rmse>a.rmse?c:a, candidates[0]);
  return {bow:worst.rmse, maxAbs:worst.maxAbs, detected:true};
}

// Détecte l'inclinaison (appareil penché) : on cherche les lignes droites dominantes
// près des bords et on mesure leur angle par rapport à l'horizontale/verticale.
// Garde-fous : on ne retient une bande que si elle forme une vraie ligne droite
// (faible erreur de régression) et il faut au moins 2 lignes fiables pour conclure,
// afin d'éviter de pénaliser à tort un meuble ou un objet isolé.
// IMPORTANT : on mesure un angle SIGNÉ par bande, puis on en prend la médiane.
// Pourquoi : sur une photo prise depuis un angle de la pièce (cas normal), la perspective
// fait fuir les lignes vers un point de fuite -> le bord du haut penche dans un sens et celui
// du bas dans l'autre (angles opposés). Un vrai appareil penché, lui, fait pencher TOUTES les
// lignes dans le même sens. En gardant le signe, la perspective symétrique s'annule à la médiane
// alors que le roulis réel subsiste. (Avant, on prenait la valeur absolue -> la perspective
// s'additionnait et créait de faux "penchés", ex. cuisine prise de 3/4 lue à 7°.)
function detectTilt(lum, W, H){
  function angleOf(pts, isVertical){
    if(pts.length<10) return null;
    const n=pts.length; let sx=0,sy=0; pts.forEach(([a,b])=>{sx+=a;sy+=b;});
    const mx=sx/n, my=sy/n; let num=0,den=0;
    pts.forEach(([a,b])=>{ num+=(a-mx)*(b-my); den+=(a-mx)*(a-mx); });
    if(den===0) return null;
    const slope=num/den, intc=my-slope*mx;
    let ss=0; pts.forEach(([a,b])=>{ const r=b-(slope*a+intc); ss+=r*r; });
    if(Math.sqrt(ss/n)>14) return null;            // pas une vraie droite : on ignore
    let ang=Math.atan(slope)*180/Math.PI;          // angle SIGNÉ
    if(isVertical) ang=-ang;                        // convention de signe inversée pour les verticales
    return ang;
  }
  function edgesY(yS,yE){ const pts=[]; for(let x=4;x<W-4;x+=4){ let bY=-1,bG=0;
    for(let y=yS+1;y<yE-1;y++){ const g=Math.abs(lum[(y+1)*W+x]-lum[(y-1)*W+x]); if(g>bG){bG=g;bY=y;} }
    if(bG>22) pts.push([x,bY]); } return pts; }
  function edgesX(xS,xE){ const pts=[]; for(let y=4;y<H-4;y+=4){ let bX=-1,bG=0;
    for(let x=xS+1;x<xE-1;x++){ const g=Math.abs(lum[y*W+(x+1)]-lum[y*W+(x-1)]); if(g>bG){bG=g;bX=x;} }
    if(bG>22) pts.push([y,bX]); } return pts; }
  const bH=Math.max(8,Math.round(H*0.14)), bW=Math.max(8,Math.round(W*0.14));
  const angs=[ angleOf(edgesY(0,bH),false), angleOf(edgesY(H-bH,H),false),
               angleOf(edgesX(0,bW),true), angleOf(edgesX(W-bW,W),true) ].filter(a=>a!==null);
  if(angs.length<2) return {tilt:0, detected:false};
  angs.sort((a,b)=>a-b);
  const m=angs.length, med = m%2 ? angs[(m-1)/2] : (angs[m/2-1]+angs[m/2])/2;
  return {tilt:Math.abs(med), detected:true};      // |médiane| : perspective annulée, roulis conservé
}

function analyze(img, prof){
  prof=prof||CTX_DEF;
  const W0=img.width, H0=img.height;
  const mp=(W0*H0)/1e6;
  // draw downscaled for pixel analysis
  const TW=Math.min(640, W0), scale=TW/W0, TH=Math.round(H0*scale);
  const cv=$('work'); cv.width=TW; cv.height=TH;
  const ctx=cv.getContext('2d',{willReadFrequently:true});
  ctx.drawImage(img,0,0,TW,TH);
  const thumb=cv.toDataURL(webpSupported()?'image/webp':'image/jpeg',0.62);
  const {data}=ctx.getImageData(0,0,TW,TH);
  const N=TW*TH;

  // luminance array + channel means + histogram
  const lum=new Float32Array(N);
  let sR=0,sG=0,sB=0, sumL=0, hi=0, lo=0;
  for(let i=0,p=0;i<N;i++,p+=4){
    const r=data[p],g=data[p+1],b=data[p+2];
    sR+=r;sG+=g;sB+=b;
    const l=0.299*r+0.587*g+0.114*b;
    lum[i]=l; sumL+=l;
    if(l>=248) hi++; if(l<=6) lo++;
  }
  const meanL=sumL/N, hiPct=hi/N*100, loPct=lo/N*100;
  const avgR=sR/N, avgG=sG/N, avgB=sB/N;

  // contrast = std dev of luminance
  let varL=0; for(let i=0;i<N;i++){const d=lum[i]-meanL;varL+=d*d;}
  const sd=Math.sqrt(varL/N);

  // sharpness: variance of Laplacian
  let sumLap=0, sumLap2=0, cnt=0;
  for(let y=1;y<TH-1;y++){
    for(let x=1;x<TW-1;x++){
      const i=y*TW+x;
      const lap=lum[i-1]+lum[i+1]+lum[i-TW]+lum[i+TW]-4*lum[i];
      sumLap+=lap; sumLap2+=lap*lap; cnt++;
    }
  }
  const lapMean=sumLap/cnt, lapVar=sumLap2/cnt-lapMean*lapMean;

  // distorsion de perspective (lignes courbées) — uniquement pertinent pour les pièces (pas façade/vue)
  const bowRes = prof.checkBow!==false ? detectBow(lum, TW, TH) : {bow:0, detected:false};

  // white balance cast (gray-world)
  const grand=(avgR+avgG+avgB)/3;
  const cast=Math.max(Math.abs(avgR-grand),Math.abs(avgG-grand),Math.abs(avgB-grand))/grand*100;
  const warm=avgR>avgB; // tungsten warm vs cold

  // ----- subscores -----
  // 1. Netteté — bornes calibrables par pièce (prof.sharpLo/sharpHi). Défaut générique calibré
  // le 2026-06-30 sur une photo réelle nette (DSC_0782.jpg -> lapVar=158), affiné par pièce
  // quand des photos de référence existent (voir CTX_OVR).
  let sharp=clamp((lapVar-prof.sharpLo)/(prof.sharpHi-prof.sharpLo)*100);
  // 2. Exposition (mean toward expoCenter + clipping penalty)
  let expoBase= meanL<60? clamp(meanL/60*55)
              : meanL<95? clamp(55+(meanL-60)/35*25)   // zone "sombre" élargie : pénalité progressive jusqu'à 95
              : meanL>=prof.expoCenter? clamp(100-(meanL-prof.expoCenter)/prof.expoSpanHigh*32)
              : 100-Math.abs(meanL-prof.expoCenter)/prof.expoSpanLow*22;
  let clipPen=0;
  if(hiPct>prof.hiTol) clipPen+=Math.min(40,(hiPct-prof.hiTol)*4);   // fenêtres/ciel cramés
  if(loPct>prof.loTol) clipPen+=Math.min(35,(loPct-prof.loTol)*4);   // zones bouchées
  let expo=clamp(expoBase-clipPen);
  // 3. Contraste — diviseur de pénalité calibrable par pièce (prof.contrastDiv)
  let contrast = sd<22? clamp(sd/22*60)
               : sd>85? clamp(100-(sd-85)/40*45)
               : 100-Math.abs(sd-58)/prof.contrastDiv*15;
  contrast=clamp(contrast);
  // 4. Balance des blancs — tolérance calibrable par pièce (prof.wbTol)
  let wb=clamp(100 - Math.max(0,cast-prof.wbTol)*prof.wbSlope);
  // 5. Cadrage / orientation — DURCI le 2026-07-01 : fourchette idéale resserrée, pénalités renforcées
  const ratio=W0/H0, landscape=W0>=H0;
  let frame = landscape ? (ratio>=1.3&&ratio<=1.85?100: ratio<1.3?72: 80)
                        : (prof.portraitOK?85:40); // portrait OK pour façade/vue, davantage pénalisé pour les pièces
  // 6. Résolution — DURCI le 2026-07-01 : seuils relevés (~+25%)
  let resol = mp>=2.8?100: mp>=1.75? 70+(mp-1.75)/1.05*30 : mp>=1.0? 40+(mp-1.0)/0.75*30 : clamp(mp/1.0*40);
  resol=clamp(resol);
  // 7. Déformation / lignes courbées (grand-angle excessif)
  // bow = écart-type des résidus (rmse) en pixels, échelle image réduite ~640px de large.
  // RECALIBRÉ le 2026-06-30 sur 12 photos d'intérieur réelles bien cadrées : leur rmse va
  // de 9 à 19 (le "contour le plus fort" suit le mobilier, pas une ligne droite parfaite).
  // L'ancien seuil (0,5) mettait donc 0 à toutes les bonnes photos -> faux positif systématique.
  // Nouveaux seuils : on ne pénalise qu'à partir d'une courbure nettement supérieure au bruit normal.
  // Si le grand-angle est activé volontairement (acc.grandangle), on tolère encore davantage.
  // DURCI le 2026-07-01 : tolérance resserrée (~-27%), pénalité qui monte plus vite (span réduit)
  const bowTol = acc.grandangle ? 19 : 15;
  const bowMaxPenalty = acc.grandangle ? 42 : 68;
  const bowSpan = acc.grandangle ? 16 : 13;
  let bow = !bowRes.detected ? 100
          : bowRes.bow<=bowTol ? 100
          : clamp(100-(bowRes.bow-bowTol)/bowSpan*bowMaxPenalty);
  bow=clamp(bow);
  // 8. Aplomb (appareil penché) — tolérant : on accepte un petit angle à main levée,
  // puis pénalité progressive. Doux par construction pour éviter les faux positifs.
  const tiltRes = detectTilt(lum, TW, TH);
  const tiltTol = 1.0; // degrés tolérés — DURCI le 2026-07-01 (était 1.3)
  let aplomb = !tiltRes.detected ? 100
             : tiltRes.tilt<=tiltTol ? 100
             : clamp(100-(tiltRes.tilt-tiltTol)/3.5*70);
  aplomb=clamp(aplomb);

  const metrics=[
    {key:'sharp',name:'Netteté',score:Math.round(sharp),w:prof.w.sharp,
      tipBad:'Photo floue ou pas assez nette. Stabilisez (2 mains/trépied), touchez l\'écran pour faire le point, évitez de bouger au déclenchement.',
      tipMid:'Netteté correcte sans plus. Verrouillez la mise au point et stabilisez davantage.'},
    {key:'expo',name:'Exposition',score:Math.round(expo),w:prof.w.expo,
      tipBad: hiPct>prof.hiTol ? `Fenêtres / zones « cramées » (${hiPct.toFixed(0)}% de blanc pur). Activez le HDR, exposez sur l\'intérieur, ou faites du bracketing.` : (meanL<60?'Photo trop sombre. Allumez les lumières, ouvrez les rideaux, montez l\'exposition (+0,3 à +0,7 EV).':(loPct>prof.loTol?`Zones bouchées (${loPct.toFixed(0)}% de noir). Ajoutez de la lumière ou éclaircissez.`:'Exposition à revoir : éclairez la pièce et équilibrez.')),
      tipMid:'Exposition acceptable. Allumez toutes les lampes et activez le HDR pour gagner en équilibre.'},
    {key:'contrast',name:'Contraste',score:Math.round(contrast),w:prof.w.contrast,
      tipBad: sd<22?'Image plate / voilée. Nettoyez l\'objectif, évitez le contre-jour brumeux, relancez le contraste.':'Contraste trop dur : adoucissez (HDR) pour récupérer ombres et hautes lumières.',
      tipMid:'Contraste un peu juste — un léger ajustement à la retouche aiderait.'},
    {key:'wb',name:'Balance des blancs',score:Math.round(wb),w:prof.w.wb,
      tipBad:`Dominante ${warm?'chaude (jaune/orange)':'froide (bleue)'} marquée. Réglez la balance des blancs, ou évitez de mélanger lumière du jour et ampoules.`,
      tipMid:'Légère dominante de couleur. Les blancs pourraient être plus neutres.'},
    {key:'frame',name:'Format / orientation',score:Math.round(frame),w:prof.w.frame,
      tipBad: landscape? 'Proportions inhabituelles. Privilégiez le format paysage 4:3 (réglage recommandé), ou à défaut 3:2.' : 'Photo en portrait : pour une pièce, le format paysage 4:3 (horizontal) est attendu sur les annonces. Le portrait reste OK pour une façade haute ou un détail.',
      tipMid:'Cadrage correct ; le format paysage 4:3 reste l\'idéal pour les pièces.'},
    {key:'bow',name:'Lignes droites / déformation',score:Math.round(bow),w:prof.w.bow,
      tipBad: acc.grandangle
        ? 'Déformation marquée même pour du grand-angle. Essayez de rester bien parallèle aux murs, ou redressez les lignes à la retouche (Lightroom/Photoshop : correction d\'objectif).'
        : 'Murs ou plafond visiblement courbés (effet grand-angle trop prononcé). Reculez-vous si possible, évitez le tout grand-angle, ou redressez les lignes à la retouche (Lightroom/Photoshop : correction d\'objectif).',
      tipMid: acc.grandangle
        ? 'Légère courbure, normale en grand-angle. Vérifiez que l\'appareil reste bien parallèle aux murs si possible.'
        : 'Légère courbure des lignes verticales/horizontales. Vérifiez que l\'appareil est bien parallèle aux murs.'},
    {key:'aplomb',name:'Aplomb (appareil droit)',score:Math.round(aplomb),w:prof.w.aplomb,
      tipBad:`Photo penchée${tiltRes.detected?` (~${tiltRes.tilt.toFixed(1)}°)`:''}. Tenez l\'appareil de niveau : activez la grille (ou le niveau à bulle), et alignez les verticales et l\'horizon sur les bords de l\'écran.`,
      tipMid:'Léger défaut d\'aplomb. Activez la grille et calez les lignes verticales sur les bords de l\'écran avant de déclencher.'},
    {key:'resol',name:'Résolution',score:Math.round(resol),w:prof.w.resol,
      tipBad:`Définition faible (${mp.toFixed(1)} Mpx). Visez ≥ 2 Mpx pour une annonce nette en plein écran. Vérifiez la qualité photo de l\'appareil.`,
      tipMid:`Définition juste (${mp.toFixed(1)} Mpx). Correct pour le web, sans marge pour le recadrage.`}
  ];

  // On ne garde que les critères pertinents pour cette catégorie (poids > 0).
  const used = metrics.filter(m=>m.w>0);
  let total=0,wsum=0;
  used.forEach(m=>{
    total+=m.score*m.w; wsum+=m.w;
    m.tip = m.score<55 ? m.tipBad : (m.score<75 ? m.tipMid : '');
  });
  let overall=Math.round(total/wsum);
  // Garde-fou : un défaut rédhibitoire (photo trop sombre/cramée ou trop floue) ne doit pas
  // être "noyé" par les autres critères dans la moyenne pondérée. On plafonne le score global
  // proportionnellement à la gravité du pire de ces deux critères.
  const expoM = metrics.find(m=>m.key==='expo'), sharpM = metrics.find(m=>m.key==='sharp');
  // DURCI le 2026-07-01 : seuil de déclenchement relevé (55 au lieu de 50) et plafond plus bas
  const worstCritical = Math.min(expoM ? expoM.score : 100, sharpM ? sharpM.score : 100);
  if(worstCritical<55){
    overall = Math.min(overall, 28 + worstCritical*0.55); // ex: critique=16 -> plafond ~37 ; critique=0 -> plafond 28
  }
  overall=Math.round(clamp(overall));
  // keep only what the UI / history need (critères pertinents uniquement)
  const slim=used.map(m=>({name:m.name,score:m.score,tip:m.tip,w:m.w}));
  return {overall, metrics:slim, thumb};
}

function band(s){return s>=75?'ok':s>=55?'mid':'bad';}
function safeName(s){return (s||'photo').normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9]+/gi,'-').replace(/^-|-$/g,'');}

/* ---------- modale de confirmation (remplace les confirm() natifs) ---------- */
let _confirmResolve=null;
function customConfirm(title,text,okLabel){
  return new Promise(resolve=>{
    _confirmResolve=resolve;
    $('confirm-title').textContent=title;
    $('confirm-text').textContent=text;
    $('confirm-ok-btn').textContent=okLabel||'Supprimer';
    $('confirm-overlay').classList.add('show');
  });
}
function confirmClose(result){
  $('confirm-overlay').classList.remove('show');
  if(_confirmResolve){const r=_confirmResolve;_confirmResolve=null;r(result);}
}
$('confirm-cancel-btn').onclick=()=>confirmClose(false);
$('confirm-ok-btn').onclick=()=>confirmClose(true);

document.addEventListener('keydown',e=>{if(e.key==='Escape'&&$('confirm-overlay').classList.contains('show'))confirmClose(false);});

const BKEY='photoimmo_pro_biens';
function loadBiens(){try{return JSON.parse(localStorage.getItem(BKEY))||[];}catch(e){return[];}}
function saveBiens(l){
  try{localStorage.setItem(BKEY,JSON.stringify(l));}catch(e){toast('Mémoire pleine : exportez puis videz d’anciens biens');}

}

/* ============================================================
   SYNCHRO CLOUD — Supabase (table biens_photoimmo)
   ------------------------------------------------------------
   localStorage reste la copie "rapide" utilisée pour l'affichage
   instantané (et le mode hors-ligne). En plus de ça, on pousse les
   biens vers Supabase, UNE LIGNE PAR BIEN (id = bien.id, colonne data
   en jsonb), pour que deux agents modifiant des biens différents en
   même temps ne s'écrasent plus mutuellement (avant : tout le lot
   était stocké dans une seule ligne géante, id=BKEY, partagée par
   tous les biens — un agent qui sauvegardait pouvait écraser la
   sauvegarde d'un collègue faite entre-temps sur un autre bien).
   L'upsert de tous les biens de la liste se fait en un seul appel
   réseau (upsert accepte un tableau de lignes). supabaseClient vient
   de supabase-client.js, déjà chargé avant ce script.
   ============================================================ */
let _bienPushTimer=null;
function queueCloudPushBiens(list){
  clearTimeout(_bienPushTimer);
  _bienPushTimer=setTimeout(()=>cloudPushBiens(list),800);
}
async function cloudPushBiens(list){
  if(!list||!list.length)return;
  try{
    const user=await getUtilisateurConnecte();
    const now=new Date().toISOString();
    const rows=list.map(b=>{
      const row={id:b.id,data:b,updated_at:now};
      if(user)row.updated_by=user.id;
      return row;
    });
    const {error}=await supabaseClient.from('biens_photoimmo').upsert(rows);
    if(error)throw error;
  }catch(e){ console.warn('[cloud] échec envoi biens_photoimmo :',e); }
}
/* Supprime la ligne cloud d'UN bien précis (appelé explicitement à la
   suppression d'un bien — voir plus bas — plutôt que déduit d'une
   comparaison de listes, pour rester simple et sûr). */
async function cloudDeleteBien(id){
  if(!id)return;
  try{
    const {error}=await supabaseClient.from('biens_photoimmo').delete().eq('id',id);
    if(error)throw error;
  }catch(e){ console.warn('[cloud] échec suppression biens_photoimmo :',e); }
}
async function cloudPullBiens(){
  try{
    const {data,error}=await supabaseClient.from('biens_photoimmo').select('id,data');
    if(error)throw error;
    return {ok:true,rows:data||[]};
  }catch(e){ console.warn('[cloud] échec lecture biens_photoimmo :',e); return {ok:false,rows:[]}; }
}
// Appelée au démarrage : si le cloud a des biens (créés/modifiés depuis un
// autre poste), on les adopte comme copie locale. Si rien n'existe encore
// côté cloud, on amorce la synchro avec la copie locale existante.
// Migre au passage l'ancienne ligne unique "photoimmo_pro_biens" (ancien
// format, tous les biens dans une seule ligne id=BKEY) si elle traîne
// encore : on l'éclate en une ligne par bien puis on la supprime.
async function syncBiensFromCloud(){
  const {ok,rows}=await cloudPullBiens();
  if(!ok)return;
  const legacyRow=rows.find(r=>r.id===BKEY);
  let entries=rows.filter(r=>r.id!==BKEY).map(r=>r.data).filter(Boolean);
  if(legacyRow&&Array.isArray(legacyRow.data)){
    for(const b of legacyRow.data){
      if(!b||!b.id)continue;
      if(!entries.some(e=>e.id===b.id))entries.push(b);
    }
    await cloudPushBiens(entries);
    try{ await supabaseClient.from('biens_photoimmo').delete().eq('id',BKEY); }catch(e){}
  }
  if(entries.length){
    const localStr=localStorage.getItem(BKEY)||'[]';
    const cloudStr=JSON.stringify(entries);
    if(cloudStr!==localStr){
      localStorage.setItem(BKEY,cloudStr);
      if(!isAnyUiOpen())renderHome();
    }
  }else{
    const localList=loadBiens();
    if(localList.length)queueCloudPushBiens(localList);
  }
}

/* ============================================================
   STOCKAGE DES VIGNETTES — IndexedDB (au lieu de localStorage)
   ------------------------------------------------------------
   Avant : chaque vignette (JPEG ~640px) était encodée en base64
   et stockée directement dans le JSON de localStorage. Le quota
   de localStorage est très limité (5-10 Mo, PARTAGÉ avec toutes
   les autres pages du portail) et le base64 gonfle la taille
   réelle de l'image d'environ 33%. Résultat : le quota était
   vite atteint avec quelques dizaines de biens seulement.

   Maintenant : localStorage ne garde que les métadonnées légères
   de chaque photo (score, pièce, date, id...). L'image elle-même
   (Blob binaire, donc plus compacte) est stockée dans une base
   IndexedDB dédiée, dont le quota est largement supérieur
   (généralement plusieurs centaines de Mo à quelques Go selon le
   navigateur et l'espace disque disponible) — tout en restant
   100% local, sans serveur ni dépendance externe.
   ============================================================ */
const IDB_NAME='photoimmo_photos', IDB_STORE='thumbs', IDB_VERSION=1;

// WebP compresse environ 25-30% mieux que JPEG à qualité équivalente : on
// l'utilise pour les vignettes stockées dès que le navigateur le supporte
// (repli automatique sur JPEG sinon, ex. anciens Safari).
let _webpSupported=null;
function webpSupported(){
  if(_webpSupported!==null)return _webpSupported;
  try{
    const c=document.createElement('canvas');c.width=1;c.height=1;
    _webpSupported=c.toDataURL('image/webp').indexOf('data:image/webp')===0;
  }catch(e){ _webpSupported=false; }
  return _webpSupported;
}
let _idbPromise=null;
function idbOpen(){
  if(_idbPromise)return _idbPromise;
  _idbPromise=new Promise((resolve,reject)=>{
    if(!('indexedDB' in window)){reject(new Error('IndexedDB indisponible'));return;}
    const req=indexedDB.open(IDB_NAME,IDB_VERSION);
    req.onupgradeneeded=()=>{ if(!req.result.objectStoreNames.contains(IDB_STORE)) req.result.createObjectStore(IDB_STORE); };
    req.onsuccess=()=>resolve(req.result);
    req.onerror=()=>reject(req.error);
  });
  return _idbPromise;
}
function idbSet(id,blob){
  return idbOpen().then(db=>new Promise((res,rej)=>{
    const tx=db.transaction(IDB_STORE,'readwrite');
    tx.objectStore(IDB_STORE).put(blob,id);
    tx.oncomplete=()=>res(true);
    tx.onerror=()=>rej(tx.error);
  })).catch(e=>{console.warn('[idbSet] échec écriture IndexedDB:',e);return false;});
}
function idbGet(id){
  return idbOpen().then(db=>new Promise((res,rej)=>{
    const tx=db.transaction(IDB_STORE,'readonly');
    const rq=tx.objectStore(IDB_STORE).get(id);
    rq.onsuccess=()=>res(rq.result||null);
    rq.onerror=()=>rej(rq.error);
  })).catch(e=>{console.warn('[idbGet] échec lecture IndexedDB:',e);return null;});
}
function idbDel(id){
  return idbOpen().then(db=>new Promise(res=>{
    const tx=db.transaction(IDB_STORE,'readwrite');
    tx.objectStore(IDB_STORE).delete(id);
    tx.oncomplete=()=>res(true);
    tx.onerror=()=>res(false);
  })).catch(()=>false);
}
function idbDelMany(ids){return Promise.all((ids||[]).map(idbDel));}

/* ============================================================
   STOCKAGE DES VIGNETTES — Supabase Storage (bucket photoimmo-photos)
   ------------------------------------------------------------
   IndexedDB (ci-dessus) reste la copie locale rapide, utilisée pour
   l'affichage instantané et le mode hors-ligne sur CE poste. En plus,
   chaque vignette est envoyée dans un bucket Supabase Storage afin
   qu'un autre poste (qui n'a évidemment pas cette photo dans sa
   propre IndexedDB) puisse la retélécharger. C'est le pendant
   "fichier binaire" de la synchro biens_photoimmo (qui elle ne
   contient que les métadonnées texte/JSON).
   Une même clé (l'id de la photo) sert de nom de fichier dans le
   bucket : pas besoin de stocker une URL, on la reconstruit toujours
   à partir de l'id.
   ============================================================ */
const PHOTO_BUCKET='photoimmo-photos';

// Envoi (fire-and-forget, n'empêche jamais l'usage local si ça échoue :
// pas de réseau sur le terrain = la photo reste quand même utilisable
// localement, et sera renvoyée à la prochaine ouverture de l'app grâce
// à retryPendingCloudUploads()).
async function cloudUploadThumb(photoId,blob){
  try{
    const {error}=await supabaseClient.storage.from(PHOTO_BUCKET)
      .upload(photoId,blob,{contentType:blob.type||'image/webp',upsert:true});
    if(error)throw error;
    return true;
  }catch(e){ console.warn('[cloud] échec envoi photo',photoId,e); return false; }
}
async function cloudDownloadThumb(photoId){
  try{
    const {data,error}=await supabaseClient.storage.from(PHOTO_BUCKET).download(photoId);
    if(error||!data)return null;
    return data; // déjà un Blob
  }catch(e){ console.warn('[cloud] échec téléchargement photo',photoId,e); return null; }
}
async function cloudDeleteThumbs(photoIds){
  if(!photoIds||!photoIds.length)return;
  try{
    const {error}=await supabaseClient.storage.from(PHOTO_BUCKET).remove(photoIds);
    if(error)throw error;
  }catch(e){ console.warn('[cloud] échec suppression photo(s)',e); }
}

// Vignettes prises hors-ligne (ou pendant un échec réseau) : leur id est
// gardé ici pour retenter l'envoi dès que l'app est rouverte avec du réseau.
const PENDING_KEY='photoimmo_pending_uploads';
function getPendingUploads(){try{return JSON.parse(localStorage.getItem(PENDING_KEY))||[];}catch(e){return[];}}
function setPendingUploads(l){try{localStorage.setItem(PENDING_KEY,JSON.stringify(l));}catch(e){}}
function markPendingUpload(photoId){const l=getPendingUploads();if(!l.includes(photoId)){l.push(photoId);setPendingUploads(l);}}
function clearPendingUpload(photoId){setPendingUploads(getPendingUploads().filter(id=>id!==photoId));}
async function retryPendingCloudUploads(){
  const l=getPendingUploads();
  for(const id of l){
    const blob=await idbGet(id);
    if(!blob){ clearPendingUpload(id); continue; }
    if(await cloudUploadThumb(id,blob)) clearPendingUpload(id);
  }
}

// dataURL (base64, issue de canvas.toDataURL) -> Blob binaire, pour l'écriture en IndexedDB
function dataURLtoBlob(dataURL){
  const [head,b64]=dataURL.split(',');
  const mime=/data:(.*?);base64/.exec(head)[1];
  const bin=atob(b64);
  const arr=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
  return new Blob([arr],{type:mime});
}

// Cache mémoire des object URL déjà résolues depuis IndexedDB, pour éviter
// de relire la base à chaque re-rendu d'un écran.
const thumbUrlCache={};
async function thumbURL(photoId){
  if(!photoId)return null;
  if(thumbUrlCache[photoId])return thumbUrlCache[photoId];
  let blob=await idbGet(photoId);
  if(!blob){
    // Pas trouvée sur ce poste (photo prise sur un autre appareil) :
    // on va la chercher dans Supabase Storage.
    blob=await cloudDownloadThumb(photoId);
    if(blob) idbSet(photoId,blob); // mise en cache locale pour la prochaine fois / le hors-ligne
  }
  if(!blob)return null;
  const url=URL.createObjectURL(blob);
  thumbUrlCache[photoId]=url;
  return url;
}
// Stocke une vignette (dataURL base64 obtenue via canvas.toDataURL) dans
// IndexedDB et alimente immédiatement le cache mémoire, pour un affichage
// instantané juste après la prise de vue sans attendre une lecture IndexedDB.
// L'envoie aussi vers Supabase Storage pour que les autres postes puissent
// la voir (sans bloquer l'UI : l'envoi se fait en tâche de fond).
async function storeThumb(photoId,dataURL){
  const blob=dataURLtoBlob(dataURL);
  if(thumbUrlCache[photoId])URL.revokeObjectURL(thumbUrlCache[photoId]);
  thumbUrlCache[photoId]=URL.createObjectURL(blob);
  const ok=await idbSet(photoId,blob);
  if(!ok) toast('Espace de stockage plein : exportez puis videz d’anciens biens');
  cloudUploadThumb(photoId,blob).then(sent=>{ if(!sent) markPendingUpload(photoId); });
}
// Hydrate en différé toutes les <img data-photo-id> encore sur le
// placeholder : on va chercher la vraie image dans IndexedDB puis on la
// branche dès qu'elle est prête, sans bloquer l'affichage de la liste.
function hydrateThumbs(root){
  const imgs=(root||document).querySelectorAll('img[data-photo-id]');
  imgs.forEach(async img=>{
    const id=img.getAttribute('data-photo-id');
    const url=await thumbURL(id);
    if(url)img.src=url;
  });
}
const PLACEHOLDER_THUMB='data:image/svg+xml,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="10" height="10"><rect width="10" height="10" fill="#e7e9f2"/></svg>');

// Migration automatique (à l'ouverture) : si d'anciennes fiches contiennent
// encore une vignette en base64 (entry.thumb, ancien format stocké dans
// localStorage), on la bascule vers IndexedDB une bonne fois pour toutes
// puis on l'efface de localStorage pour libérer immédiatement de la place.
async function migrateThumbsToIDB(){
  const l=loadBiens();
  let changed=false;
  for(const b of l){
    for(const p of (b.photos||[])){
      if(p.thumb){
        try{ await storeThumb(p.id,p.thumb); }catch(e){ console.warn('[migration] échec sur',p.id,e); continue; }
        delete p.thumb;
        changed=true;
      }
    }
  }
  if(changed){ saveBiens(l); console.info('[PhotoImmo] Vignettes migrées vers IndexedDB (localStorage allégé).'); }
}
function getBien(id){return loadBiens().find(b=>b.id===id);}

/* ===== Liaison inter-apps (PhotoImmo <-> Bibliothèque <-> Dossier) =====
   Registre partagé — table Supabase "biens_registry", UNE LIGNE PAR BIEN
   (id = norm, data = entry) : exactement le même format que dossier.html.
   (Avant : PhotoImmo écrivait une seule ligne géante contenant tous les
   biens sous id=REG_KEY, incompatible avec le format ligne-par-bien de
   dossier.html — c'est corrigé ici.)
   Une copie en mémoire (_registryCache) est chargée une fois au démarrage
   (loadRegistry), avec une copie locale (localStorage, clé REG_KEY) qui
   sert de cache hors-ligne / premier affichage instantané. Le reste du
   code continue de lire getBienRegistry() de façon synchrone, comme avant. */
const REG_KEY='laforet_biens_registry';
function normBienLabel(s){return (s||'').trim().toLowerCase().replace(/\s+/g,' ');}

let _registryCache=[];
try{ _registryCache=JSON.parse(localStorage.getItem(REG_KEY))||[]; }catch(e){ _registryCache=[]; }
function getBienRegistry(){ return _registryCache; }
function _persistRegistryLocal(){ try{localStorage.setItem(REG_KEY,JSON.stringify(_registryCache));}catch(e){} }

/* Envoie UNE ligne (un bien) vers Supabase — même format que dossier.html. */
async function pushRegistryEntry(entry){
  if(!entry||!entry.norm)return;
  try{
    const user=await getUtilisateurConnecte();
    const payload={id:entry.norm,data:entry,updated_at:new Date().toISOString()};
    if(user)payload.updated_by=user.id;
    const {error}=await supabaseClient.from('biens_registry').upsert(payload);
    if(error)throw error;
  }catch(e){ console.warn('[cloud] échec envoi biens_registry :',e); }
}

/* Charge le registre complet depuis Supabase (une ligne par bien).
   Migre au passage l'ancienne ligne unique "laforet_biens_registry"
   (ancien format PhotoImmo) si elle existe encore, en l'éclatant en une
   ligne par bien puis en la supprimant. */
async function loadRegistry(){
  try{
    const {data,error}=await supabaseClient.from('biens_registry').select('id,data');
    if(error)throw error;
    const rows=data||[];
    const legacyRow=rows.find(r=>r.id===REG_KEY);
    const entries=rows.filter(r=>r.id!==REG_KEY).map(r=>r.data).filter(Boolean);
    if(legacyRow&&Array.isArray(legacyRow.data)){
      for(const entry of legacyRow.data){
        if(!entry)continue;
        if(!entry.norm&&entry.label)entry.norm=normBienLabel(entry.label);
        if(!entry.norm)continue;
        if(!entries.some(e=>e.norm===entry.norm)){
          entries.push(entry);
          await pushRegistryEntry(entry);
        }
      }
      try{ await supabaseClient.from('biens_registry').delete().eq('id',REG_KEY); }catch(e){}
    }
    _registryCache=entries.filter(entry=>{
      if(!entry.norm&&entry.label)entry.norm=normBienLabel(entry.label);
      return !!entry.norm;
    });
    _persistRegistryLocal();
    if(!isAnyUiOpen())renderHome();
  }catch(e){ console.warn('[cloud] échec chargement biens_registry :',e); }
}
function upsertBienLink(label,appKey,appValue){
  const norm=normBienLabel(label);if(!norm)return null;
  let entry=_registryCache.find(e=>e.norm===norm);
  if(!entry){entry={norm,label:label.trim(),createdAt:Date.now(),links:{}};_registryCache.unshift(entry);}
  else entry.label=label.trim();
  if(!entry.links)entry.links={};
  entry.links[appKey]=appValue;
  entry.updatedAt=Date.now();
  _persistRegistryLocal();
  pushRegistryEntry(entry);
  return entry;
}
function findBienLink(label){return _registryCache.find(e=>e.norm===normBienLabel(label))||null;}
/* Crée ou met à jour les infos centrales (type/ville/statut/prix/notes)
   d'un bien dans le registre partagé — même logique que dans dossier.html.
   Permet à PhotoImmo de créer un bien "à la volée" tout en le faisant
   apparaître correctement rempli dans le Dossier des biens. */
function upsertCentral(label,fields){
  const norm=normBienLabel(label);if(!norm)return null;
  let entry=_registryCache.find(e=>e.norm===norm);
  if(!entry){entry={norm,label:label.trim(),createdAt:Date.now(),links:{},central:{}};_registryCache.unshift(entry);}
  if(!entry.central)entry.central={};
  Object.assign(entry.central,fields);
  entry.updatedAt=Date.now();
  _persistRegistryLocal();
  pushRegistryEntry(entry);
  return entry;
}
/* Devine une ville à partir d'une adresse "12 rue des Lilas, Pithiviers" -> "Pithiviers" */
function guessVilleFromAddress(addr){
  const parts=(addr||'').split(',');
  return parts.length>1?parts[parts.length-1].trim():'';
}

const REQUIRED={
  maison:['facade','entree','salon','cuisine','sam','chambre','sdb','bureau','jardin','terrasse','garage','vue'],
  appartement:['entree','salon','cuisine','sam','chambre','sdb','bureau','terrasse','vue']
};
function roomsForBien(b){const req=(REQUIRED[b.type]||REQUIRED.maison).filter(k=>DATA[k]);const extra=Object.keys(DATA).filter(k=>!req.includes(k));return{req,extra};}
function photosOf(b,room){return (b.photos||[]).filter(p=>p.room===room);}
function bestOf(b,room){const ps=photosOf(b,room);return ps.length?Math.max(...ps.map(p=>p.score)):null;}
function progress(b){const{req}=roomsForBien(b);const done=req.filter(k=>photosOf(b,k).length>0).length;return{done,total:req.length};}

/* ---------- bouton retour (navigateur / geste mobile) ----------
   Sans ce correctif, appuyer sur "retour" alors qu'un écran (fiche bien,
   guide, appareil photo, zoom photo...) est ouvert quitte directement
   PhotoImmo au lieu de simplement refermer l'écran en cours — on perd
   le fil de ce qu'on faisait. On synchronise donc l'historique du
   navigateur avec l'état "quelque chose est ouvert / tout est fermé",
   pour que le retour se comporte comme dans une vraie app : il referme
   d'abord ce qui est ouvert, et ne quitte la page qu'une fois revenu
   à l'accueil. */
let uiHistoryOpen=false, suppressPopstate=false, uiSyncScheduled=false;
function isAnyUiOpen(){
  return !!document.querySelector('.screen.open') ||
         ($('camWrap')&&$('camWrap').classList.contains('open')) ||
         ($('lightbox')&&$('lightbox').classList.contains('open'));
}
function syncUiHistory(){
  if(uiSyncScheduled)return;
  uiSyncScheduled=true;
  setTimeout(()=>{
    uiSyncScheduled=false;
    const open=isAnyUiOpen();
    if(open&&!uiHistoryOpen){
      uiHistoryOpen=true;
      history.pushState({photoimmoUi:true},'',location.href);
    }else if(!open&&uiHistoryOpen){
      uiHistoryOpen=false;
      suppressPopstate=true;
      history.back();
    }
  },0);
}
window.addEventListener('popstate',()=>{
  if(suppressPopstate){suppressPopstate=false;return;}
  if(uiHistoryOpen||isAnyUiOpen()){
    document.querySelectorAll('.screen.open').forEach(s=>s.classList.remove('open'));
    if($('camWrap')&&$('camWrap').classList.contains('open'))closeCam();
    if($('lightbox')&&$('lightbox').classList.contains('open'))closeLightbox();
    uiHistoryOpen=false;
    if(currentBienId)renderBien();
  }
});

// Affiche l'espace de stockage réellement utilisé par le navigateur pour ce
// site (photos incluses), quand l'API le permet. Purement informatif : aide
// à anticiper avant d'atteindre la limite plutôt que de la découvrir via une
// erreur. Discret et silencieux si l'API n'est pas disponible (ex. Safari
// en navigation privée).
async function updateStorageInfo(){
  const el=$('storageInfo');if(!el)return;
  try{
    if(!(navigator.storage&&navigator.storage.estimate))return;
    const {usage,quota}=await navigator.storage.estimate();
    if(usage==null)return;
    const fmt=n=>n<1024*1024?Math.round(n/1024)+' Ko':(n/1024/1024).toFixed(usage<50*1024*1024?1:0)+' Mo';
    const pct=quota?Math.round(usage/quota*100):null;
    el.textContent=' · Stockage utilisé : '+fmt(usage)+(pct!=null?' ('+pct+'% de l’espace disponible)':'');
  }catch(e){/* silencieux : purement informatif */}
}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

      const l=loadBiens();l.unshift(b);saveBiens(l);

  m.querySelector('#nbSearch').value='';
  renderNbList(m);
  openScreen('newBienModal');
  setTimeout(()=>m.querySelector('#nbAddr').focus(),250);
}
function renderNbList(m){
  const q=normBienLabel(m.querySelector('#nbSearch').value);
  const reg=getBienRegistry().filter(e=>!(e.links&&e.links.photoimmo));
  const filtered=(q?reg.filter(e=>e.norm.includes(q)):reg).slice().sort((a,b)=>a.label.localeCompare(b.label,'fr'));
  const listEl=m.querySelector('#nbList');
  if(!filtered.length){
    listEl.innerHTML='<div class="empty">'+(reg.length?'Aucun résultat pour cette recherche.':'Aucun autre bien disponible pour l’instant.')+'</div>';
    return;
  }
  listEl.innerHTML=filtered.map(e=>{
    const t=(e.central&&e.central.type)||'';
    const norm=e.norm.replace(/"/g,'&quot;');
    return `<div class="bien-card" data-pick="${norm}" style="cursor:pointer">
      <div class="bien-ic">${ic(t==='appartement'?'building':'home',24)}</div>
      <div class="bien-main"><div class="bien-addr">${esc(e.label)}</div>
      <div class="bien-sub">${t==='appartement'?'Appartement':(t==='maison'?'Maison':'Type non renseigné')}</div></div>
    </div>`;

async function startStream(){

/* niveau (orientation) */
function requestOrientation(){
  if(typeof DeviceOrientationEvent!=='undefined' && typeof DeviceOrientationEvent.requestPermission==='function'){
    DeviceOrientationEvent.requestPermission().then(s=>{if(s==='granted')window.addEventListener('deviceorientation',onOrient);}).catch(()=>{});
  }else{window.addEventListener('deviceorientation',onOrient);}
}
function onOrient(e){
  lastGamma=e.gamma; lastBeta=e.beta;
  // Détecter l'angle d'orientation écran (0 = portrait, ±90 = paysage)
  const angle = (screen.orientation && screen.orientation.angle != null)
    ? screen.orientation.angle
    : (typeof window.orientation !== 'undefined' ? window.orientation : 0);
  let roll;
  if (Math.abs(angle) === 90 || Math.abs(angle) === 270) {
    // Mode paysage : l'axe de roulis devient beta
    roll = e.beta != null ? e.beta : 0;
    // Paysage gauche (270° / -90°) : inverser
    if (angle === 270 || angle === -90) roll = -roll;
  } else {
    // Mode portrait : axe de roulis = gamma
    roll = e.gamma != null ? e.gamma : 0;
  }
  lastRoll = Math.max(-45, Math.min(45, roll));
}

function guideLoop(){
  if(!camOpen)return;
  const cv=$('camGuide'),w=cv.clientWidth,h=cv.clientHeight;
  if(cv.width!==w||cv.height!==h){cv.width=w;cv.height=h;}
  const g=cv.getContext('2d');g.clearRect(0,0,w,h);
  if(showGrid){g.strokeStyle='rgba(255,255,255,.32)';g.lineWidth=1;
    for(let i=1;i<3;i++){g.beginPath();g.moveTo(w*i/3,0);g.lineTo(w*i/3,h);g.stroke();g.beginPath();g.moveTo(0,h*i/3);g.lineTo(w,h*i/3);g.stroke();}}
  const ok=Math.abs(lastRoll)<=1.5;lastTiltOK=ok;
  g.save();g.translate(w/2,h/2);g.rotate(-lastRoll*Math.PI/180);
  g.strokeStyle=ok?'rgba(63,200,120,.95)':'rgba(255,205,70,.95)';g.lineWidth=3;
  g.beginPath();g.moveTo(-w*0.17,0);g.lineTo(-w*0.04,0);g.moveTo(w*0.04,0);g.lineTo(w*0.17,0);g.stroke();g.restore();
  g.fillStyle='rgba(255,255,255,.55)';g.beginPath();g.arc(w/2,h/2,3.5,0,7);g.fill();
  requestAnimationFrame(guideLoop);
}
function startCoach(){
  clearInterval(coachT);
  const ac=document.createElement('canvas');ac.width=160;
  coachT=setInterval(()=>{
    const v=$('camVideo');if(!v.videoWidth)return;
    ac.height=Math.round(160*v.videoHeight/v.videoWidth);
    const c=ac.getContext('2d');c.drawImage(v,0,0,ac.width,ac.height);
    const d=c.getImageData(0,0,ac.width,ac.height).data;let sum=0,hi=0,n=ac.width*ac.height;
    for(let i=0,p=0;i<n;i++,p+=4){const l=0.299*d[p]+0.587*d[p+1]+0.114*d[p+2];sum+=l;if(l>=248)hi++;}
    const meanL=sum/n,hiPct=hi/n*100;
    const chips=[];
    if(meanL<70)chips.push(['warn',ic('moon',13)+' Trop sombre — allumez les lumières']);
    else if(meanL>205)chips.push(['warn',ic('sun',13)+' Trop clair']);
    else chips.push(['ok',ic('lightbulb',13)+' Lumière OK']);
    if(hiPct>8)chips.push(['warn',ic('window',13)+' Fenêtre cramée — HDR']);
    chips.push(lastTiltOK?['ok',ic('ruler',13)+' Droit']:['lvl',ic('ruler',13)+' Penché ('+Math.abs(Math.round(lastRoll))+'°)']);
    $('camChips').innerHTML=chips.map(([c,t])=>`<span class="cam-chip ${c}">${t}</span>`).join('');
  },500);
}
// Certains navigateurs (Android/Chrome notamment) ne pivotent pas correctement
// le flux caméra quand le téléphone est tourné en paysage vers la gauche
// (angle d'écran 270°/-90°) : la photo capturée sort alors à l'envers.
// On détecte cet angle au moment du déclenchement et on corrige avec une rotation 180°.
function captureNeedsFlip(){
  // Priorité aux valeurs brutes de l'accéléromètre (gamma) : elles reflètent
  // l'inclinaison physique réelle même si le verrouillage de rotation de l'écran
  // est activé (auquel cas screen.orientation.angle reste figé à 0 à tort).
  if(lastGamma!=null){
    return lastGamma<-45; // paysage, téléphone tourné vers la gauche
  }
  const angle=(screen.orientation&&screen.orientation.angle!=null)
    ? screen.orientation.angle
    : (typeof window.orientation!=='undefined'?window.orientation:0);
  return angle===270||angle===-90;
}
async function capturePhoto(){
  const flip=captureNeedsFlip();
  let blob=null;
  try{
    const track=camStream&&camStream.getVideoTracks()[0];
    if(window.ImageCapture&&track){const ic=new ImageCapture(track);blob=await ic.takePhoto().catch(()=>null);}
  }catch(e){console.warn('[capturePhoto] ImageCapture indisponible/échoué:',e);}
  if(blob&&flip){
    try{
      const bmp=await createImageBitmap(blob);
      const c=document.createElement('canvas');c.width=bmp.width;c.height=bmp.height;
      const g=c.getContext('2d');g.translate(c.width,c.height);g.rotate(Math.PI);g.drawImage(bmp,0,0);
      const fixed=await new Promise(r=>c.toBlob(r,'image/jpeg',0.92));
      if(fixed)blob=fixed;
    }catch(e){console.warn('[capturePhoto] correction flip échouée, blob ImageCapture conservé tel quel:',e);}
  }
  if(!blob){
    try{
      const v=$('camVideo');if(!v.videoWidth){toast('Caméra pas prête');return;}
      const c=document.createElement('canvas');c.width=v.videoWidth;c.height=v.videoHeight;
      const g=c.getContext('2d');
      if(flip){g.translate(c.width,c.height);g.rotate(Math.PI);}
      g.drawImage(v,0,0);
      blob=await new Promise(r=>c.toBlob(r,'image/jpeg',0.92));
    }catch(e){console.warn('[capturePhoto] fallback canvas échoué:',e);}
  }
  if(!blob){
    console.error('[capturePhoto] échec total (ImageCapture + fallback canvas), aucune photo capturée');
    toast('Échec de la capture, réessayez');
    return;
  }
  const file=new File([blob],'shot.jpg',{type:blob.type||'image/jpeg'});
  const room=camRoom;closeCam();handlePhoto(file,room);
}

// Lit l'orientation EXIF d'un File/Blob JPEG (premiers 64 Ko suffisent)
// Retourne : 1=normal, 3=180°, 6=90°CW, 8=270°CW (conventions EXIF standard)
async function readExifOrientation(file){
  try{
    const buf=await file.slice(0,65536).arrayBuffer();
    const view=new DataView(buf);
    if(view.getUint16(0)!==0xFFD8) return 1; // pas un JPEG
    let off=2;
    while(off<view.byteLength-4){
      const marker=view.getUint16(off);off+=2;
      const len=view.getUint16(off);
      if(marker===0xFFE1){ // APP1 = EXIF
        if(view.getUint32(off+2)===0x45786966){ // "Exif"
          const tiff=off+8;
          const le=view.getUint16(tiff)===0x4949;
          const get16=(o)=>le?view.getUint16(tiff+o,true):view.getUint16(tiff+o);
          const get32=(o)=>le?view.getUint32(tiff+o,true):view.getUint32(tiff+o);
          const ifd=tiff+get32(4);
          const n=get16(ifd-tiff);
          for(let i=0;i<n;i++){
            const tag=get16(ifd-tiff+2+i*12);
            if(tag===0x0112) return get16(ifd-tiff+2+i*12+8);
          }
        }
      }
      off+=len;
    }
  }catch(e){console.warn('[readExifOrientation] lecture EXIF échouée, orientation par défaut utilisée:',e);}
  return 1;
}
// Corrige l'affichage d'une <img> selon l'orientation EXIF du fichier
async function fixThumbOrientation(imgEl, file){
  if(!file) return;
  const o=await readExifOrientation(file);
  // Sur iOS Safari moderne, image-orientation:from-image suffit (o=1 = déjà géré)
  // On force quand même data-rot pour les cas où le CSS seul ne suffit pas
  if(o===6)      imgEl.setAttribute('data-rot','90');
  else if(o===3) imgEl.setAttribute('data-rot','180');
  else if(o===8) imgEl.setAttribute('data-rot','270');
  else           imgEl.removeAttribute('data-rot');
}

async function rotatePhoto(entry){
  try{
    const sf=sessionFull[entry.id];
    const srcUrl=(sf&&sf.url)||thumbUrlCache[entry.id]||await thumbURL(entry.id);

    await new Promise((res,rej)=>{img.onload=res;img.onerror=rej;img.src=srcUrl;});
    const w=img.naturalWidth,h=img.naturalHeight;
    const c=document.createElement('canvas');c.width=h;c.height=w;
    const g=c.getContext('2d');g.translate(c.width/2,c.height/2);g.rotate(Math.PI/2);g.drawImage(img,-w/2,-h/2);
    const blob=await new Promise(r=>c.toBlob(r,'image/jpeg',0.92));
    if(!blob)return;
    const file=new File([blob],'shot.jpg',{type:'image/jpeg'});
    const newUrl=URL.createObjectURL(file);
    if(sf&&sf.url)URL.revokeObjectURL(sf.url);
    sessionFull[entry.id]={file,url:newUrl};
    const prof=profileFor(entry.room);
    const bmp=await createImageBitmap(file,{imageOrientation:'from-image'}).catch(()=>loadImg(file));

    entry.score=res.overall;entry.metrics=res.metrics;
    await storeThumb(entry.id,res.thumb);

    <div class="thumb-wrap"><img class="thumb" id="scoreImg" data-photo-id="${entry.id}" src="${url}" alt=""><canvas id="ovCanvas" style="display:none"></canvas></div>
    <div class="ov-toggle"><button id="ovPhoto" aria-pressed="true">Photo</button><button id="ovDef">${ic('search',14)} Voir les défauts</button></div>
    <div class="score-hero"><div class="gauge"><svg width="160" height="160" viewBox="0 0 160 160"><circle cx="80" cy="80" r="${R}" fill="none" stroke="#eceef3" stroke-width="12"/><circle cx="80" cy="80" r="${R}" fill="none" stroke="${v.c}" stroke-width="12" stroke-linecap="round" stroke-dasharray="${C}" stroke-dashoffset="${off}"/></svg><div class="val"><div class="num" style="color:${v.c}">${o}</div><div class="den">/ 100</div></div></div>
    <div class="verdict" style="color:${v.c}">${v.t}</div><div class="verdict-sub">${v.s}</div></div>
    ${prio}${mh}
    <button class="btn btn-green" id="keepBtn" style="width:100%;margin-top:6px">${entry.kept?ic('check',16)+' Photo retenue':ic('checkcircle',16)+' Retenir cette photo'}</button>
    <div class="score-actions">
      <button id="retakeBtn">${ic('camera',16)} Reprendre</button>
      <button id="reimportBtn">${ic('image',16)} Réimporter</button>
      <button id="rotateBtn">${ic('rotate',16)} Pivoter</button>
      ${ps.length>1?`<button id="cmpBtn">${ic('scale',16)} Comparer (${ps.length})</button>`:''}
    </div>
    <button class="btn btn-ghost" id="saveImgBtn" style="width:100%;margin-top:4px">${ic('download',16)} Enregistrer la photo</button>`;
  if(url===PLACEHOLDER_THUMB) hydrateThumbs($('scoreBody'));
  const ring=$('scoreBody').querySelector('circle:last-of-type');ring.style.transition='none';ring.setAttribute('stroke-dashoffset',C);
  requestAnimationFrame(()=>{ring.style.transition='stroke-dashoffset 1s ease';ring.setAttribute('stroke-dashoffset',off);});
  $('ovPhoto').onclick=()=>setOverlay(false);
  $('ovDef').onclick=()=>setOverlay(true,$('scoreImg').src);
  $('retakeBtn').onclick=()=>{closeScreen('scoreScreen');openCam(entry.room);};
  $('reimportBtn').onclick=()=>{closeScreen('scoreScreen');triggerImport(entry.room);};
  $('rotateBtn').onclick=()=>rotatePhoto(entry);
  $('keepBtn').onclick=()=>{const willKeep=keepPhoto(entry.room,entry.id);entry.kept=willKeep;$('keepBtn').innerHTML=willKeep?ic('check',16)+' Photo retenue':ic('checkcircle',16)+' Retenir cette photo';toast(willKeep?'Photo retenue pour '+DATA[entry.room].name:'Sélection annulée');};
  const cb=$('cmpBtn');if(cb)cb.onclick=()=>{closeScreen('scoreScreen');openCompare(entry.room);};
  $('saveImgBtn').onclick=()=>saveImage(entry);
  openScreen('scoreScreen');
  // Corriger l'orientation de l'aperçu si le fichier a une rotation EXIF (ex: prise en paysage sur iOS)
  const sf=sessionFull[entry.id];
  if(sf&&sf.file) fixThumbOrientation($('scoreImg'), sf.file);
}
function setOverlay(on,url){
  const img=$('scoreImg'),cv=$('ovCanvas');
  $('ovPhoto').setAttribute('aria-pressed',!on);$('ovDef').setAttribute('aria-pressed',on);
  if(!on){cv.style.display='none';return;}
  const im=new Image();im.onload=()=>{
    const W=im.naturalWidth,H=im.naturalHeight;cv.width=W;cv.height=H;
    const g=cv.getContext('2d');g.drawImage(im,0,0);
    const d=g.getImageData(0,0,W,H),px=d.data;
    for(let i=0,p=0;i<W*H;i++,p+=4){const l=0.299*px[p]+0.587*px[p+1]+0.114*px[p+2];if(l>=248){px[p]=255;px[p+1]=40;px[p+2]=40;px[p+3]=170;}else{px[p+3]=0;}}
    g.putImageData(d,0,0);
    // grille des tiers
    g.strokeStyle='rgba(255,255,255,.5)';g.lineWidth=Math.max(1,W/400);
    for(let k=1;k<3;k++){g.beginPath();g.moveTo(W*k/3,0);g.lineTo(W*k/3,H);g.stroke();g.beginPath();g.moveTo(0,H*k/3);g.lineTo(W,H*k/3);g.stroke();}
    cv.style.display='block';
  };im.src=url;
}
function keepPhoto(room,id){const b=getBien(currentBienId);const cur=b.photos.find(p=>p.room===room&&p.id===id);const willKeep=!(cur&&cur.kept);b.photos.forEach(p=>{if(p.room===room)p.kept=willKeep&&(p.id===id);});const l=loadBiens();l[l.findIndex(x=>x.id===currentBienId)]=b;saveBiens(l);return willKeep;}
async function saveImage(entry){
  const sf=sessionFull[entry.id];const name='Laforet-'+safeName(DATA[entry.room].name)+'-'+entry.score+'.jpg';
  try{
    if(sf&&sf.file&&navigator.canShare&&navigator.canShare({files:[sf.file]})){await navigator.share({files:[new File([sf.file],name,{type:'image/jpeg'})],title:name});return;}
  }catch(e){if(e&&e.name==='AbortError')return;}
  const href=(sf&&sf.url)||await thumbURL(entry.id);
  if(!href){toast('Photo introuvable');return;}
  const a=document.createElement('a');a.href=href;a.download=name;document.body.appendChild(a);a.click();a.remove();
}

/* ============================ COMPARER ============================ */
function openCompare(room){
  const b=getBien(currentBienId),ps=photosOf(b,room).slice().sort((a,c)=>c.score-a.score);
  if(!ps.length)return;
  $('cmpTitle').textContent='Comparer · '+ctxLabel(room);
  const best=ps[0].score;
  $('cmpBody').innerHTML='<div class="footer-note" style="margin:0 0 12px">Le meilleur angle est mis en avant. Tapez sur la photo à publier pour la retenir.</div><div class="cmp-grid">'+
    ps.map(p=>{const bd=band(p.score),isBest=p.score===best;
      const src=(sessionFull[p.id]&&sessionFull[p.id].url)||thumbUrlCache[p.id]||PLACEHOLDER_THUMB;
      return `<div class="cmp-card ${p.kept?'kept':(isBest?'best':'')}" data-pid="${p.id}">
        <img src="${src}" data-photo-id="${p.id}" alt="">
        <div class="cmp-info"><div class="cmp-score" style="color:${bd==='ok'?'#0f6b3f':bd==='mid'?'#b07d12':'#9a3b2e'}">${p.score}<span style="font-size:13px;color:#aab">/100</span> ${isBest?ic('star',14):''}</div>
        <div class="cmp-actions"><div class="cmp-state">${p.kept?ic('check',13)+' Retenue':'Tapez pour retenir'}</div><button class="cmp-save" data-save="${p.id}" title="Enregistrer la photo">${ic('download',17)}</button></div></div></div>`;}).join('')+'</div>';
  hydrateThumbs($('cmpBody'));
  $('cmpBody').onclick=e=>{
    const sv=e.target.closest('[data-save]');
    if(sv){const p=photosOf(getBien(currentBienId),room).find(x=>x.id===sv.dataset.save);if(p)saveImage(p);return;}
    const c=e.target.closest('[data-pid]');if(!c)return;
    if(e.target.tagName==='IMG'){openLightbox(e.target.src);return;}
    const willKeep=keepPhoto(room,c.dataset.pid);openCompare(room);renderBien();toast(willKeep?'Angle retenu':'Sélection annulée');
  };
  openScreen('cmpScreen');
}

/* ============================ LIGHTBOX (visionneuse plein écran) ============================ */
let lbScale=1,lbX=0,lbY=0,lbStartDist=0,lbStartScale=1,lbLastTap=0,lbDragging=false,lbDragStartX=0,lbDragStartY=0,lbOrigX=0,lbOrigY=0;
function lbApply(){$('lbImg').style.transform=`translate(${lbX}px,${lbY}px) scale(${lbScale})`;}
function lbReset(){lbScale=1;lbX=0;lbY=0;lbApply();}
function openLightbox(src){
  $('lbImg').src=src;lbReset();
  $('lightbox').classList.add('open');
  syncUiHistory();
}
function closeLightbox(){
  $('lightbox').classList.remove('open');
  $('lbImg').src='';
  syncUiHistory();
}
function lbDist(t){return Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY);}
(function initLightbox(){
  $('lbClose').onclick=closeLightbox;
  $('lightbox').addEventListener('click',e=>{if(e.target.id==='lightbox')closeLightbox();});
  const stage=$('lbStage');
  stage.addEventListener('touchstart',e=>{
    if(e.touches.length===2){lbStartDist=lbDist(e.touches);lbStartScale=lbScale;}
    else if(e.touches.length===1){
      const now=Date.now();
      if(now-lbLastTap<300){lbScale=lbScale>1?1:2;lbX=0;lbY=0;lbApply();lbLastTap=0;}
      else{lbLastTap=now;lbDragging=true;lbDragStartX=e.touches[0].clientX;lbDragStartY=e.touches[0].clientY;lbOrigX=lbX;lbOrigY=lbY;}
    }
  },{passive:true});
  stage.addEventListener('touchmove',e=>{
    if(e.touches.length===2){
      e.preventDefault();
      const d=lbDist(e.touches);
      lbScale=Math.min(5,Math.max(1,lbStartScale*(d/lbStartDist)));
      lbApply();
    }else if(e.touches.length===1&&lbDragging&&lbScale>1){
      lbX=lbOrigX+(e.touches[0].clientX-lbDragStartX);
      lbY=lbOrigY+(e.touches[0].clientY-lbDragStartY);
      lbApply();
    }
  },{passive:false});
  stage.addEventListener('touchend',()=>{lbDragging=false;if(lbScale<=1){lbX=0;lbY=0;lbApply();}});
  stage.addEventListener('dblclick',()=>{lbScale=lbScale>1?1:2;lbX=0;lbY=0;lbApply();});
  document.addEventListener('keydown',e=>{if(e.key==='Escape'&&$('lightbox').classList.contains('open'))closeLightbox();});
})();

/* ============================ EXPORT PDF (100% LOCAL) ============================ */
/* Aucune dépendance externe : on construit une fiche imprimable et on laisse le
   navigateur l'« Enregistrer au format PDF ». Rien ne quitte l'appareil. */
async function exportBien(id){
  const b=getBien(id);if(!b||!(b.photos||[]).length){toast('Aucune photo à exporter');return;}
  const {req,extra}=roomsForBien(b);const order=req.concat(extra);
  let cells='';
  for(const k of order){
    const ps=photosOf(b,k);if(!ps.length)continue;
    const pick=ps.find(p=>p.kept)||ps.slice().sort((a,c)=>c.score-a.score)[0];
    const src=(sessionFull[pick.id]&&sessionFull[pick.id].url)||await thumbURL(pick.id);
    if(!src)continue;
    cells+=`<figure><img src="${src}" alt=""><figcaption>${esc(DATA[k].name)} — ${pick.score}/100</figcaption></figure>`;
  }
  $('printArea').innerHTML=`<div class="pa-head"><h2>PhotoImmo — ${esc(b.address)}</h2>`+
    `<div class="pa-sub">${b.type==='appartement'?'Appartement':'Maison'} · ${fmtDate(b.created)} · Laforêt Pithiviers</div></div>`+
    `<div class="pa-grid">${cells}</div>`;
  toast('Choisissez « Enregistrer au format PDF » dans l’impression');
  setTimeout(()=>window.print(),350);
}

/* ============================ PWA ============================ */
if('serviceWorker' in navigator && location.protocol==='https:'){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
/* init */
renderHome();
// Migration silencieuse des vignettes stockées à l'ancien format (base64 en
// localStorage) vers IndexedDB. Se fait en tâche de fond : la liste des
// biens s'affiche déjà normalement pendant que ça tourne.
migrateThumbsToIDB();
// Synchro cloud (Supabase) : lancée après l'affichage local instantané,
// en tâche de fond, pour ne pas bloquer/ralentir l'ouverture de l'app.
syncBiensFromCloud();
loadRegistry();
// Renvoie vers Supabase Storage les vignettes prises hors-ligne / dont
// l'envoi avait échoué la dernière fois (ex. terrain sans réseau).
retryPendingCloudUploads();

// Arrivée depuis un lien de la Bibliothèque de prompts (bibliotheque.html?bien=...)
// -> on ouvre directement la fiche si elle existe déjà, sinon on propose de la créer.
(function handleIncomingBienLink(){
  const params=new URLSearchParams(location.search);
  const label=params.get('bien');
  if(!label)return;
  history.replaceState(null,'',location.pathname); // nettoie l'URL pour éviter un re-déclenchement au rechargement
  const link=findBienLink(label);
  const existing=link&&link.links&&link.links.photoimmo?getBien(link.links.photoimmo):null;
  if(existing){
    openBien(existing.id);
    toast('🔗 Bien retrouvé depuis la Bibliothèque de prompts');
  }else{
    openNewBien(label,params.get('type')||'');
    toast('🔗 Bien reçu depuis la Bibliothèque — complétez et créez la fiche pour le lier');
  }
})();

// Filet de sécurité bfcache : si le navigateur restaure cette page depuis son
// cache mémoire (ex. retour arrière après avoir quitté avec la caméra ouverte),
// on repart sur un état propre plutôt que de laisser un flux vidéo figé/coupé
// ou un écran resté ouvert par erreur.
window.addEventListener('pageshow',e=>{
  if(!e.persisted)return;
  if($('camWrap')&&$('camWrap').classList.contains('open'))closeCam();
  document.querySelectorAll('.screen.open').forEach(s=>s.classList.remove('open'));
  if($('lightbox')&&$('lightbox').classList.contains('open'))closeLightbox();
  uiHistoryOpen=false;
  renderHome();
});
</script>
<!-- Dark mode -->
<script>
(function(){
  const btns=document.querySelectorAll('.dark-toggle');
  const icons=document.querySelectorAll('.dark-toggle-icon');
  const apply=dark=>{
    document.documentElement.setAttribute('data-theme',dark?'dark':'light');
    icons.forEach(icon=>icon.innerHTML=dark?ICON_PATHS.sun:ICON_PATHS.moon);
    try{localStorage.setItem('theme',dark?'dark':'light');}catch(e){}
  };
  const saved=localStorage.getItem('theme');
  const sysDark=window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches;
  apply(saved?saved==='dark':sysDark);
  btns.forEach(btn=>btn.addEventListener('click',()=>apply(document.documentElement.getAttribute('data-theme')!=='dark')));
})();
</script>
